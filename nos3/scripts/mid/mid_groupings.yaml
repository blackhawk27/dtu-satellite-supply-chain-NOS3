# MID classification rules - name-prefix → {layer, subsystem}.
# Read by scripts/mid/gen_mid_registry.py at `make config` time.
#
# Longest matching prefix wins, so list more specific prefixes (e.g. CFE_TIME_)
# without worrying about ordering vs. shorter ones (CFE_).
#
# Layers (used for Kibana faceting):
#   FSW_CORE      - cFE OS services: ES, EVS, SB, TBL, TIME
#   FSW_HERITAGE  - standard cFS apps: SCH, TO, CI, DS, FM, CF, LC, SC, HK,
#                   HS, CS, MD, MM, SBN, MGR, TO_LAB, CI_LAB
#   COMPONENT     - NOS3 generic_* hardware-component FSW apps
#   RESEARCH      - DTU-added research apps (BEACON_APP, NOISY_APP, ...)

# ── cFE core (FSW_CORE) ─────────────────────────────────────────────────────
- prefix: CFE_ES_
  layer: FSW_CORE
  subsystem: ES
- prefix: CFE_EVS_
  layer: FSW_CORE
  subsystem: EVS
- prefix: CFE_SB_
  layer: FSW_CORE
  subsystem: SB
- prefix: CFE_TBL_
  layer: FSW_CORE
  subsystem: TBL
- prefix: CFE_TIME_
  layer: FSW_CORE
  subsystem: TIME

