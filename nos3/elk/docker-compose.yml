services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.10
    container_name: nos3-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - es_data_vol:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    networks:
      - nos3-core

  logstash:
    image: docker.elastic.co/logstash/logstash:7.17.10
    container_name: nos3-logstash
    volumes:
      - ./logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
      - ../attack_logs:/attack_logs:ro
      - ../omni_logs:/omni_logs:ro
      # Generated by `make config`; mounted read-only so the pipeline's
      # `translate` filters can resolve msg_id -> msg_name / layer / subsystem
      # via the same registry that the build uses. Keep these YAMLs in sync
      # with cfg/build/mid_registry.json.
      - ../cfg/build/elk:/etc/logstash/mid:ro
    networks:
      - nos3-core
    depends_on:
      - elasticsearch

  kibana:
    image: docker.elastic.co/kibana/kibana:7.17.10
    container_name: nos3-kibana
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    networks:
      - nos3-core
    depends_on:
      - elasticsearch

networks:
  nos3-core:
    external: true

volumes:
  es_data_vol:
