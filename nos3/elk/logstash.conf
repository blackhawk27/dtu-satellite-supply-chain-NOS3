input {
  # LAYER 1: The Software Bus "God View"
  file {
    path => "/attack_logs/cfs_god_view.json"
    start_position => "beginning"
    codec => "json"
    type => "software_bus"
  }

  # LAYER 2: The Omni-Logs (Hardware, Physics, OS, Radio)
  file {
    path => "/omni_logs/*.log"
    start_position => "beginning"
    type => "system_log"
  }
}

filter {
  if [type] == "system_log" {
    # 1. Træk subsystem ud af filnavnet
    grok {
      match => { "path" => ".*/%{GREEDYDATA:subsystem}\.log" }
    }
    
    # 2. Gør navnet pænt
    mutate {
      gsub => [
        "subsystem", "sc01_-_", ""
      ]
    }

    # 3. DET MAGISKE KEY-VALUE FILTER
    # Dette trækker automatisk alle variabler ud af teksten og laver dem til felter!
    kv {
      source => "message"
      
      # Hvad adskiller navnet fra værdien? (Ofte et lighedstegn eller et kolon)
      value_split => "=:" 
      
      # Hvad adskiller de forskellige variabler fra hinanden? (Mellemrum eller komma)
      field_split => " ," 
      
      # Fjern irriterende tegn fra felt-navnene (som f.eks. parenteser)
      trim_key => "\[\]\(\)\s"
      trim_value => "\[\]\(\)\s"
    }
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "nos3-telemetry-%{+YYYY.MM.dd}"
  }
  stdout { codec => rubydebug }
}