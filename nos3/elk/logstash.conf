input {
  file {
    path => "/attack_logs/cfs_god_view.json"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    codec => "json"
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "satellite-thesis-%{+YYYY.MM.dd}"
  }
  
  # This prints the output to the terminal so we can see it working
  stdout { codec => rubydebug }
}