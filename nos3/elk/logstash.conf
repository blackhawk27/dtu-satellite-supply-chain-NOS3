        "0x0940" => "GENERIC_ADCS_HK_TLM_MID"
        "0x0941" => "GENERIC_ADCS_DI_TLM_MID"
        "0x0942" => "GENERIC_ADCS_AD_TLM_MID"
        "0x0943" => "GENERIC_ADCS_GNC_TLM_MID"
        "0x0944" => "GENERIC_ADCS_AC_TLM_MID"
        "0x0945" => "GENERIC_ADCS_DO_TLM_MID"
        "0x1910" => "GENERIC_CSS_CMD_MID"
        "0x1911" => "GENERIC_CSS_REQ_HK_MID"
        "0x0910" => "GENERIC_CSS_HK_TLM_MID"
        "0x1920" => "GENERIC_FSS_CMD_MID"
        "0x1921" => "GENERIC_FSS_REQ_HK_MID"
