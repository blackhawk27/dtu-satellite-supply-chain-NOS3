input {
  # LAYER 1: The Software Bus "God View"
  file {
    path => "/attack_logs/cfs_god_view.json"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    codec => "json"
    type => "software_bus"
  }

  # LAYER 2: The Omni-Logs (Hardware, Physics, OS, Radio)
  file {
    path => "/omni_logs/*.log"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    type => "system_log"
  }
}

filter {
  if [type] == "software_bus" {
    translate {
      field => "msg_id"
      destination => "msg_name"
      dictionary => {
        "0x1806" => "CFE_ES_CMD_MID"
        "0x1808" => "CFE_ES_SEND_HK_MID"
        "0x0800" => "CFE_ES_HK_TLM_MID"
        "0x080B" => "CFE_ES_APP_TLM_MID"
        "0x0810" => "CFE_ES_MEMSTATS_TLM_MID"
        "0x1803" => "CFE_SB_CMD_MID"
        "0x180B" => "CFE_SB_SEND_HK_MID"
        "0x0803" => "CFE_SB_HK_TLM_MID"
        "0x080A" => "CFE_SB_STATS_TLM_MID"

      }
      fallback => "UNKNOWN_MSG"
    }
  }

  if [type] == "system_log" {
    # Extract subsystem name from filename
    grok {
      match => { "path" => ".*/%{GREEDYDATA:subsystem}\.log" }
    }
    mutate {
      gsub => [
        "subsystem", "sc01_-_", ""
      ]
    }

    # Drop XML config dumps and blank lines that pollute the index
    if [message] =~ /^\s*</ or [message] =~ /^\s*$/ {
      drop {}
    }

    # Parse the common NOS3 simulator log format:
    # 2026-03-22 23:39:52.058348 [ INFO  ] - Component::Method:  message text
    grok {
      match => { "message" => "%{TIMESTAMP_ISO8601:sim_timestamp} \[%{DATA:log_level}\] - %{DATA:sim_component}:\s+%{GREEDYDATA:sim_message}" }
      tag_on_failure => []
    }

    # Trim surrounding whitespace from log_level (e.g. " INFO  " -> "INFO")
    if [log_level] {
      mutate { strip => ["log_level"] }
    }

    # Parse EPS power/battery numeric fields
    # These lines are logged without a Component::Method: prefix so match on message directly
    if [subsystem] == "EPS_Sim" {
      grok {
        match => { "message" => "Power from the solar panels is %{NUMBER:eps_solar_power_w}" }
        tag_on_failure => []
      }
      grok {
        match => { "message" => "Total power used is %{NUMBER:eps_power_used_w}" }
        tag_on_failure => []
      }
      grok {
        match => { "message" => "Battery Watt Hours are now %{NUMBER:eps_battery_wh}" }
        tag_on_failure => []
      }
      grok {
        match => { "message" => "Battery Voltage is now %{NUMBER:eps_battery_mv}" }
        tag_on_failure => []
      }
      grok {
        match => { "message" => "Solar Array Connected\? %{NUMBER:eps_solar_array_enabled}" }
        tag_on_failure => []
      }
      mutate {
        convert => {
          "eps_solar_power_w"       => "float"
          "eps_power_used_w"        => "float"
          "eps_battery_wh"          => "float"
          "eps_battery_mv"          => "integer"
          "eps_solar_array_enabled" => "integer"
        }
      }
    }

    # Parse Reaction Wheel momentum from REPLY lines
    if [sim_message] =~ /REPLY\s+CURRENT_MOMENTUM=/ {
      grok {
        match => { "sim_message" => "REPLY\s+CURRENT_MOMENTUM=%{NUMBER:rw_momentum}" }
        tag_on_failure => []
      }
      mutate { convert => { "rw_momentum" => "float" } }
    }

    # Parse GPS data point telemetry lines (raw lines emitted after "Parsed data point:")
    if [message] =~ /^GPS Data Point:/ {
      grok {
        match => { "message" => "GPS Data Point:\s+AbsTime:\s+%{NUMBER:gps_abs_time}\s+Leap Seconds:\s+%{NUMBER:gps_leap_seconds}.*ECEF:\s+%{NUMBER:gps_ecef_x},%{NUMBER:gps_ecef_y},%{NUMBER:gps_ecef_z}.*Geodetic Lat/Lng/Alt\(m above WGS-84\):\s+%{NUMBER:gps_lat},%{NUMBER:gps_lon},%{NUMBER:gps_alt}" }
        tag_on_failure => []
      }
      mutate {
        convert => {
          "gps_abs_time" => "float"
          "gps_ecef_x"   => "float"
          "gps_ecef_y"   => "float"
          "gps_ecef_z"   => "float"
          "gps_lat"      => "float"
          "gps_lon"      => "float"
          "gps_alt"      => "float"
        }
      }
    }

    # Parse cpu_monitor key=value format (only relevant for cpu_monitor / CPU_Monitor logs)
    if [subsystem] in ["cpu_monitor", "CPU_Monitor"] {
      kv {
        source => "message"
        value_split => "=:"
        field_split => " ,"
        trim_key => "\[\]\(\)\s"
        trim_value => "\[\]\(\)\s"
      }
      mutate {
        convert => {
          "TOTAL_CPU_PCT" => "float"
          "CPU_PCT"       => "float"
          "NUM_PIDS"      => "integer"
          "CMDCOUNTER"    => "integer"
          "ERRCOUNTER"    => "integer"
          "PINGCOUNTER"   => "integer"
        }
      }
    }


    # Parse cFS Event messages (specifically useful for HK, HS and other apps)
    # Matcher typisk format: "HK_APP 1: HK Initialized. Version..." 
    # eller "HS_APP 10: Watchdog enabled..."
    if [sim_message] =~ /HK_APP/ or [sim_message] =~ /HS_APP/ {
      grok {
        match => { 
          "sim_message" => "%{WORD:cfs_app_name}\s+%{NUMBER:cfs_event_id}:\s+%{GREEDYDATA:cfs_event_text}" 
        }
        tag_on_failure => ["unparsed_cfs_event"]
      }
      
      # Konverter event ID til et rigtigt tal, så du kan sortere på det i Kibana
      if [cfs_event_id] {
        mutate {
          convert => { "cfs_event_id" => "integer" }
        }
      }
    }
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "nos3-telemetry-%{+YYYY.MM.dd}"
  }
  stdout { codec => rubydebug }
}