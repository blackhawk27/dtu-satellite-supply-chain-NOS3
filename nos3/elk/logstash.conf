        "0x1926" => "GENERIC_IMU_REQ_HK_MID"
        "0x0925" => "GENERIC_IMU_HK_TLM_MID"
        "0x192A" => "GENERIC_MAG_CMD_MID"
        "0x192B" => "GENERIC_MAG_REQ_HK_MID"
        "0x092A" => "GENERIC_MAG_HK_TLM_MID"
        "0x1935" => "GENERIC_STAR_TRACKER_CMD_MID"
        "0x1936" => "GENERIC_STAR_TRACKER_REQ_HK_MID"
        "0x0935" => "GENERIC_STAR_TRACKER_HK_TLM_MID"
        "0x193A" => "GENERIC_TORQUER_CMD_MID"
        "0x193B" => "GENERIC_TORQUER_REQ_HK_MID"
        "0x093A" => "GENERIC_TORQUER_HK_TLM_MID"
        "0x18EA" => "GENERIC_THRUSTER_CMD_MID"
        "0x18EB" => "GENERIC_THRUSTER_REQ_HK_MID"
        "0x08EA" => "GENERIC_THRUSTER_HK_TLM_MID"
        "0x18C8" => "ARDUCAM_CMD_MID"
        "0x18C9" => "ARDUCAM_SEND_HK_MID"
        "0x08C8" => "ARDUCAM_HK_TLM_MID"
        "0x18FA" => "SAMPLE_APP_CMD_MID"
        "0x18FB" => "SAMPLE_APP_SEND_HK_MID"
        "0x08FA" => "SAMPLE_APP_HK_TLM_MID"
      }
      fallback => "UNKNOWN_MSG"
    }

    # ── Attack layer classification ───────────────────────────────────────────
    # Classifies each SB message by which architectural layer it belongs to.
    # This is the primary field used to filter/facet Kibana dashboards by attack type.
    translate {
      field       => "msg_id"
      destination => "layer"
      dictionary  => {
        "0x1801" => "FSW_CORE"  "0x1803" => "FSW_CORE"
        "0x1804" => "FSW_CORE"  "0x1805" => "FSW_CORE"
        "0x1806" => "FSW_CORE"  "0x1808" => "FSW_CORE"
        "0x1809" => "FSW_CORE"  "0x180B" => "FSW_CORE"
        "0x180C" => "FSW_CORE"  "0x180D" => "FSW_CORE"
        "0x1810" => "FSW_CORE"  "0x1811" => "FSW_CORE"
        "0x0800" => "FSW_CORE"  "0x0801" => "FSW_CORE"
        "0x0803" => "FSW_CORE"  "0x0804" => "FSW_CORE"
        "0x0805" => "FSW_CORE"  "0x0806" => "FSW_CORE"
        "0x0808" => "FSW_CORE"  "0x0809" => "FSW_CORE"
        "0x080A" => "FSW_CORE"  "0x080B" => "FSW_CORE"
        "0x080C" => "FSW_CORE"  "0x0810" => "FSW_CORE"
        "0x1895" => "FSW_HERITAGE"  "0x1896" => "FSW_HERITAGE"
        "0x0897" => "FSW_HERITAGE"  "0x0898" => "FSW_HERITAGE"
        "0x1880" => "FSW_HERITAGE"  "0x1881" => "FSW_HERITAGE"
        "0x1882" => "FSW_HERITAGE"  "0x0880" => "FSW_HERITAGE"
        "0x0881" => "FSW_HERITAGE"  "0x0882" => "FSW_HERITAGE"
        "0x1884" => "FSW_HERITAGE"
        "0x18E0" => "FSW_HERITAGE"  "0x18E1" => "FSW_HERITAGE"
        "0x08E0" => "FSW_HERITAGE"
        "0x18BB" => "FSW_HERITAGE"  "0x18BC" => "FSW_HERITAGE"
        "0x08B8" => "FSW_HERITAGE"  "0x08B9" => "FSW_HERITAGE"  "0x08BA" => "FSW_HERITAGE"
        "0x188C" => "FSW_HERITAGE"  "0x188D" => "FSW_HERITAGE"
        "0x088A" => "FSW_HERITAGE"  "0x088B" => "FSW_HERITAGE"
        "0x088C" => "FSW_HERITAGE"  "0x088D" => "FSW_HERITAGE"  "0x088E" => "FSW_HERITAGE"
        "0x18B3" => "FSW_HERITAGE"  "0x18B4" => "FSW_HERITAGE"
        "0x18B5" => "FSW_HERITAGE"  "0x08B0" => "FSW_HERITAGE"  "0x08B3" => "FSW_HERITAGE"
        "0x18A4" => "FSW_HERITAGE"  "0x18A5" => "FSW_HERITAGE"
        "0x18A6" => "FSW_HERITAGE"  "0x08A7" => "FSW_HERITAGE"
        "0x18A9" => "FSW_HERITAGE"  "0x18AA" => "FSW_HERITAGE"
        "0x18AB" => "FSW_HERITAGE"  "0x08AA" => "FSW_HERITAGE"
        "0x191A" => "COMPONENT"  "0x191B" => "COMPONENT"  "0x091A" => "COMPONENT"
        "0x1870" => "COMPONENT"  "0x1871" => "COMPONENT"  "0x0870" => "COMPONENT"
        "0x1992" => "COMPONENT"  "0x1993" => "COMPONENT"  "0x0993" => "COMPONENT"
        "0x1930" => "COMPONENT"  "0x1931" => "COMPONENT"
        "0x0930" => "COMPONENT"  "0x0931" => "COMPONENT"
        "0x1940" => "COMPONENT"  "0x1941" => "COMPONENT"  "0x1942" => "COMPONENT"
        "0x0940" => "COMPONENT"  "0x0941" => "COMPONENT"  "0x0942" => "COMPONENT"
        "0x0943" => "COMPONENT"  "0x0944" => "COMPONENT"  "0x0945" => "COMPONENT"
        "0x1910" => "COMPONENT"  "0x1911" => "COMPONENT"  "0x0910" => "COMPONENT"
        "0x1920" => "COMPONENT"  "0x1921" => "COMPONENT"  "0x0920" => "COMPONENT"
        "0x1925" => "COMPONENT"  "0x1926" => "COMPONENT"  "0x0925" => "COMPONENT"
        "0x192A" => "COMPONENT"  "0x192B" => "COMPONENT"  "0x092A" => "COMPONENT"
        "0x1935" => "COMPONENT"  "0x1936" => "COMPONENT"  "0x0935" => "COMPONENT"
        "0x193A" => "COMPONENT"  "0x193B" => "COMPONENT"  "0x093A" => "COMPONENT"
        "0x18EA" => "COMPONENT"  "0x18EB" => "COMPONENT"  "0x08EA" => "COMPONENT"
        "0x18C8" => "COMPONENT"  "0x18C9" => "COMPONENT"  "0x08C8" => "COMPONENT"
        "0x18FA" => "COMPONENT"  "0x18FB" => "COMPONENT"  "0x08FA" => "COMPONENT"
        "0x18F0" => "RESEARCH"
        "0x18F1" => "RESEARCH"
        "0x08F0" => "RESEARCH"
      }
      fallback => "UNKNOWN"
    }

    # ── Subsystem name ────────────────────────────────────────────────────────
    translate {
      field       => "msg_id"
      destination => "subsystem"
      dictionary  => {
        "0x1806" => "ES"        "0x1808" => "ES"     "0x0800" => "ES"
        "0x080B" => "ES"        "0x0810" => "ES"
        "0x1801" => "EVS"       "0x1809" => "EVS"    "0x0801" => "EVS"
        "0x0808" => "EVS"       "0x0809" => "EVS"
        "0x1803" => "SB"        "0x180B" => "SB"     "0x0803" => "SB"     "0x080A" => "SB"
        "0x1804" => "TBL"       "0x180C" => "TBL"    "0x0804" => "TBL"    "0x080C" => "TBL"
        "0x1805" => "TIME"      "0x180D" => "TIME"   "0x0805" => "TIME"
        "0x0806" => "TIME"      "0x1810" => "TIME"   "0x1811" => "TIME"
        "0x1895" => "SCH"       "0x1896" => "SCH"    "0x0897" => "SCH"    "0x0898" => "SCH"
        "0x1880" => "TO"        "0x1881" => "TO"     "0x1882" => "TO"
        "0x0880" => "TO"        "0x0881" => "TO"     "0x0882" => "TO"
        "0x1884" => "CI"
        "0x18E0" => "CI_LAB"    "0x18E1" => "CI_LAB" "0x08E0" => "CI_LAB"
        "0x18BB" => "DS"        "0x18BC" => "DS"
        "0x08B8" => "DS"        "0x08B9" => "DS"     "0x08BA" => "DS"
        "0x188C" => "FM"        "0x188D" => "FM"     "0x088A" => "FM"
        "0x088B" => "FM"        "0x088C" => "FM"     "0x088D" => "FM"     "0x088E" => "FM"
        "0x18B3" => "CF"        "0x18B4" => "CF"     "0x18B5" => "CF"
        "0x08B0" => "CF"        "0x08B3" => "CF"
        "0x18A4" => "LC"        "0x18A5" => "LC"     "0x18A6" => "LC"     "0x08A7" => "LC"
        "0x18A9" => "SC"        "0x18AA" => "SC"     "0x18AB" => "SC"     "0x08AA" => "SC"
        "0x18F0" => "BEACON"    "0x18F1" => "BEACON" "0x08F0" => "BEACON"
        "0x191A" => "EPS"       "0x191B" => "EPS"    "0x091A" => "EPS"
        "0x1870" => "GPS"       "0x1871" => "GPS"    "0x0870" => "GPS"
        "0x1992" => "RW"        "0x1993" => "RW"     "0x0993" => "RW"
        "0x1930" => "RADIO"     "0x1931" => "RADIO"  "0x0930" => "RADIO"  "0x0931" => "RADIO"
        "0x1940" => "ADCS"      "0x1941" => "ADCS"   "0x1942" => "ADCS"
        "0x0940" => "ADCS"      "0x0941" => "ADCS"   "0x0942" => "ADCS"
        "0x0943" => "ADCS"      "0x0944" => "ADCS"   "0x0945" => "ADCS"
        "0x1910" => "CSS"       "0x1911" => "CSS"    "0x0910" => "CSS"
        "0x1920" => "FSS"       "0x1921" => "FSS"    "0x0920" => "FSS"
        "0x1925" => "IMU"       "0x1926" => "IMU"    "0x0925" => "IMU"
        "0x192A" => "MAG"       "0x192B" => "MAG"    "0x092A" => "MAG"
        "0x1935" => "STAR_TRACKER" "0x1936" => "STAR_TRACKER" "0x0935" => "STAR_TRACKER"
        "0x193A" => "TORQUER"   "0x193B" => "TORQUER" "0x093A" => "TORQUER"
        "0x18EA" => "THRUSTER"  "0x18EB" => "THRUSTER" "0x08EA" => "THRUSTER"
        "0x18C8" => "CAM"       "0x18C9" => "CAM"    "0x08C8" => "CAM"
        "0x18FA" => "SAMPLE"    "0x18FB" => "SAMPLE" "0x08FA" => "SAMPLE"
      }
      fallback => "UNKNOWN"
    }

    # ── Command vs Telemetry direction ────────────────────────────────────────
    # CCSDS primary header: bit 12 set (0x1xxx) = command; clear (0x0xxx) = telemetry.
    ruby {
      code => '
        mid_str = event.get("msg_id") || ""
        begin
          mid = Integer(mid_str)
          event.set("msg_direction", mid >= 0x1800 ? "CMD" : "TLM")
          event.set("msg_id_int", mid)
        rescue ArgumentError
          event.set("msg_direction", "UNKNOWN")
        end
      '
    }

    # ── noisy_app attack: tag the 7 pipe-saturation target MIDs ─────────────
    # Used to plot the spam burst as a distinct series in Kibana.
    # Actual targets from noisy_app.c: ES=0x1806 EVS=0x1801 SB=0x1803 TIME=0x1805
    #   TBL=0x1804 CI_APP=0x1884 TO=0x1880   (note: 0x1884 is ci, NOT ci_lab 0x18E0)
    if [msg_id] in ["0x1806", "0x1801", "0x1803", "0x1805", "0x1804", "0x1884", "0x1880"] {
      mutate { add_tag => ["noisy_app_spam_target"] }
    }

    # ── Tag the noisy_app trigger candidates (BEACON PING) ───────────────────
    if [msg_id] == "0x18F0" {
      mutate { add_tag => ["beacon_cmd"] }
    }
  }


  # ===========================================================================
  # LAYER 2 - Simulator and auxiliary logs  (omni_logs/*.log)
  # ===========================================================================
  if [type] == "system_log" {

    # ── Extract subsystem name from filename ──────────────────────────────────
    grok {
      match => { "path" => ".*/%{GREEDYDATA:subsystem}\.log" }
    }
    mutate {
      gsub => [ "subsystem", "sc01_-_", "" ]
    }

    # Drop XML config dumps and pure blank lines
    if [message] =~ /^\s*</ or [message] =~ /^\s*$/ {
      drop {}
    }

    # ────────────────────────────────────────────────────────────────────────
    # cfs_evs - cFS Event Services events captured via cfs_evs_capture.sh
    #
    # docker logs --timestamps adds an ISO 8601 prefix:
    #   2024-01-15T10:30:45.123456789Z   <cFS EVS line>
    #
    # cFE EVS console format:
    #   YYYY-DDD-HH:MM:SS.sssss AppName EventID/EventType: Message text
    # ────────────────────────────────────────────────────────────────────────
    if [subsystem] == "cfs_evs" {
      # Strip optional docker timestamp prefix
      grok {
        match      => { "message" => "(?:%{TIMESTAMP_ISO8601:docker_ts}Z?\s+)?%{GREEDYDATA:evs_raw}" }
        tag_on_failure => []
      }

      # Parse cFE EVS line: year-doy-time AppName id/type: text
      grok {
        match      => { "evs_raw" => "%{YEAR}-%{MONTHDAY}-%{TIME}\s+%{DATA:evs_app_name}\s+%{NUMBER:evs_event_id}/%{NUMBER:evs_event_type_num}:\s+%{GREEDYDATA:evs_message}" }
        tag_on_failure => []
      }

      # Map numeric type to readable severity
      if [evs_event_type_num] {
        mutate { convert => { "evs_event_id" => "integer" "evs_event_type_num" => "integer" } }
        if [evs_event_type_num] == 1 { mutate { add_field => { "evs_severity" => "DEBUG"       } } }
        if [evs_event_type_num] == 2 { mutate { add_field => { "evs_severity" => "INFORMATION" } } }
        if [evs_event_type_num] == 4 { mutate { add_field => { "evs_severity" => "ERROR"       } } }
        if [evs_event_type_num] == 8 { mutate { add_field => { "evs_severity" => "CRITICAL"    } } }
      }

      # Tag noisy_app attack lifecycle events
      if [evs_app_name] == "NOISY_APP" {
        mutate { add_field => { "attack_app" => "NOISY_APP" } }
        if [evs_message] =~ /THRESHOLD REACHED|MULTI-VECTOR ATTACK/ {
          mutate { add_tag => ["attack_armed"] }
        }
        if [evs_message] =~ /PING.*intercepted/ {
          mutate { add_tag => ["attack_trigger_ping"] }
        }
        if [evs_message] =~ /Active.*Listening/ {
          mutate { add_tag => ["attack_loaded"] }
        }
      }

      # Tag BEACON_APP PONG responses (confirms link health pre/post attack)
      if [evs_app_name] == "BEACON_APP" and [evs_message] =~ /PONG|Ping.*acknowledged/ {
        mutate { add_tag => ["beacon_pong"] }
      }

      # Tag SB overflow / pipe full errors (key noisy_app side effect)
      if [evs_message] =~ /Pipe Overflow|MsgId.*dropped|ERR.*pipe/ {
        mutate { add_tag => ["sb_pipe_overflow"] }
      }
    }


    # ────────────────────────────────────────────────────────────────────────
    # Common NOS3 simulator log format
    # 2026-03-22 23:39:52.058348 [ INFO  ] - Component::Method:  message text
    # ────────────────────────────────────────────────────────────────────────
    if [subsystem] != "cfs_evs" and [subsystem] !~ /cpu_monitor/ {
      grok {
        match      => { "message" => "%{TIMESTAMP_ISO8601:sim_timestamp} \[%{DATA:log_level}\] - %{DATA:sim_component}:\s+%{GREEDYDATA:sim_message}" }
        tag_on_failure => []
      }
      if [log_level] {
        mutate { strip => ["log_level"] }
      }
    }


    # ────────────────────────────────────────────────────────────────────────
    # EPS simulator - power and battery numeric fields
    # Log source: omni_logs/nos3-eps.log (captured from sc01-eps-sim container)
    # ────────────────────────────────────────────────────────────────────────
    if [subsystem] =~ /nos3-eps/ or [subsystem] == "EPS_Sim" {
      grok { match => { "message" => "Power from the solar panels is %{NUMBER:eps_solar_power_w}"   } tag_on_failure => [] }
      grok { match => { "message" => "Total power used is %{NUMBER:eps_power_used_w}"               } tag_on_failure => [] }
      grok { match => { "message" => "Battery Watt Hours are now %{NUMBER:eps_battery_wh}"          } tag_on_failure => [] }
      grok { match => { "message" => "Battery Voltage is now %{NUMBER:eps_battery_mv}"              } tag_on_failure => [] }
      grok { match => { "message" => "Solar Array Connected\? %{NUMBER:eps_solar_array_enabled}"    } tag_on_failure => [] }
      mutate {
        convert => {
          "eps_solar_power_w"       => "float"
          "eps_power_used_w"        => "float"
          "eps_battery_wh"          => "float"
          "eps_battery_mv"          => "integer"
          "eps_solar_array_enabled" => "integer"
        }
      }
    }


    # ────────────────────────────────────────────────────────────────────────
    # Reaction Wheel simulator - angular momentum
    # ────────────────────────────────────────────────────────────────────────
    if [sim_message] =~ /REPLY\s+CURRENT_MOMENTUM=/ {
      grok {
        match      => { "sim_message" => "REPLY\s+CURRENT_MOMENTUM=%{NUMBER:rw_momentum}" }
        tag_on_failure => []
      }
      mutate { convert => { "rw_momentum" => "float" } }
    }


    # ────────────────────────────────────────────────────────────────────────
    # GPS simulator - position and time
    # ────────────────────────────────────────────────────────────────────────
    if [message] =~ /^GPS Data Point:/ {
      grok {
        match => { "message" => "GPS Data Point:\s+AbsTime:\s+%{NUMBER:gps_abs_time}\s+Leap Seconds:\s+%{NUMBER:gps_leap_seconds}.*ECEF:\s+%{NUMBER:gps_ecef_x},%{NUMBER:gps_ecef_y},%{NUMBER:gps_ecef_z}.*Geodetic Lat/Lng/Alt\(m above WGS-84\):\s+%{NUMBER:gps_lat},%{NUMBER:gps_lon},%{NUMBER:gps_alt}" }
        tag_on_failure => []
      }
      mutate {
        convert => {
          "gps_abs_time"   => "float"
          "gps_ecef_x"     => "float"
          "gps_ecef_y"     => "float"
          "gps_ecef_z"     => "float"
          "gps_lat"        => "float"
          "gps_lon"        => "float"
          "gps_alt"        => "float"
        }
      }
    }


    # ────────────────────────────────────────────────────────────────────────
    # IMU simulator - linear acceleration and angular rotation rates
    # Log source: omni_logs/nos3-imu.log
    # Each axis value is its own log event (separate docker log line).
    # Format: "X linear acceleration: -9.80665, converted to 999999"
    # NOTE: match against [message] not [sim_message] — the common NOS3 grok
    # parses "X linear acceleration" as sim_component, leaving only the bare
    # number in sim_message.  Matching the full raw line avoids this split.
    # ────────────────────────────────────────────────────────────────────────
    if [subsystem] =~ /nos3-imu/ {
      grok { match => { "message" => "X linear acceleration:\s*%{NUMBER:imu_acc_x}" }  tag_on_failure => [] }
      grok { match => { "message" => "Y linear acceleration:\s*%{NUMBER:imu_acc_y}" }  tag_on_failure => [] }
      grok { match => { "message" => "Z linear acceleration:\s*%{NUMBER:imu_acc_z}" }  tag_on_failure => [] }
      grok { match => { "message" => "X rotational rate:\s*%{NUMBER:imu_gyro_x}" }     tag_on_failure => [] }
      grok { match => { "message" => "Y rotational rate:\s*%{NUMBER:imu_gyro_y}" }     tag_on_failure => [] }
      grok { match => { "message" => "Z rotational rate:\s*%{NUMBER:imu_gyro_z}" }     tag_on_failure => [] }
      mutate {
        convert => {
          "imu_acc_x"  => "float"
          "imu_acc_y"  => "float"
          "imu_acc_z"  => "float"
          "imu_gyro_x" => "float"
          "imu_gyro_y" => "float"
          "imu_gyro_z" => "float"
        }
      }
    }


    # ────────────────────────────────────────────────────────────────────────
    # Magnetometer simulator - field vector
    # Log source: omni_logs/nos3-mag.log
    # sim_message contains: "Data point=Magnetometer values: x, y, z"
    # NOTE: MAG values use scientific notation (e.g. 8.44e-07) which the
    # built-in %{NUMBER} grok pattern does not support.  A custom SCINUM
    # pattern is defined inline to handle the exponent part.
    # ────────────────────────────────────────────────────────────────────────
    if [subsystem] =~ /nos3-mag/ {
      grok {
        pattern_definitions => { "SCINUM" => "[-+]?(?:[0-9]+\.?[0-9]*|\.[0-9]+)(?:[Ee][+-]?[0-9]+)?" }
        match => { "sim_message" => "Magnetometer values:\s*%{SCINUM:mag_x},\s*%{SCINUM:mag_y},\s*%{SCINUM:mag_z}" }
        tag_on_failure => []
      }
      mutate {
        convert => {
          "mag_x" => "float"
          "mag_y" => "float"
          "mag_z" => "float"
        }
      }
    }


    # ────────────────────────────────────────────────────────────────────────
    # Fine Sun Sensor (FSS) simulator - alpha/beta sun angles
    # Log source: omni_logs/nos3-fss.log
    # sim_message: "data_point data:  valid=TRUE , alpha=12.345, beta=-23.456"
    # NOTE: valid=TRUE has trailing space before comma ("TRUE , alpha=");
    #       valid=FALSE does not ("FALSE, alpha="). Use \s* before the comma.
    # ────────────────────────────────────────────────────────────────────────
    if [subsystem] =~ /nos3-fss/ {
      grok {
        match => { "sim_message" => "valid=%{WORD:fss_valid}\s*,\s*alpha=%{NUMBER:fss_alpha},\s*beta=%{NUMBER:fss_beta}" }
        tag_on_failure => []
      }
      mutate {
        convert => {
          "fss_alpha" => "float"
          "fss_beta"  => "float"
        }
      }
    }


    # ────────────────────────────────────────────────────────────────────────
    # Star Tracker simulator - attitude quaternion
    # Log source: omni_logs/nos3-startrk.log
    # sim_message: "is_valid=1, data_point=q0, q1, q2, q3, converted values=..."
    # ────────────────────────────────────────────────────────────────────────
    if [subsystem] =~ /nos3-startrk/ {
      grok {
        match => { "sim_message" => "is_valid=%{NUMBER:st_valid},\s*data_point=%{NUMBER:st_q0},\s*%{NUMBER:st_q1},\s*%{NUMBER:st_q2},\s*%{NUMBER:st_q3}" }
        tag_on_failure => []
      }
      mutate {
        convert => {
          "st_valid" => "integer"
          "st_q0"    => "float"
          "st_q1"    => "float"
          "st_q2"    => "float"
          "st_q3"    => "float"
        }
      }
    }


    # ────────────────────────────────────────────────────────────────────────
    # cpu_monitor - container-level CPU and per-thread breakdown
    #
    # Two line formats written by scripts/cpu_monitor.sh:
    #   CPU_MONITOR TOTAL_CPU_PCT=12.5 MEM_USED=45.2MiB MEM_LIMIT=... NUM_PIDS=42
    #   CPU_THREAD  THREAD_NAME=BEACON_APP CPU_PCT=1.2
    # ────────────────────────────────────────────────────────────────────────
    if [subsystem] in ["cpu_monitor", "CPU_Monitor"] {
      kv {
        source      => "message"
        value_split => "=:"
        field_split => " ,"
        trim_key    => "() \t"
        trim_value  => "() \t"
      }
      mutate {
        convert => {
          "TOTAL_CPU_PCT" => "float"
          "CPU_PCT"       => "float"
          "NUM_PIDS"      => "integer"
          "CMDCOUNTER"    => "integer"
          "ERRCOUNTER"    => "integer"
          "PINGCOUNTER"   => "integer"
        }
      }
      # Tag lines that indicate a CPU spike (attack onset signal)
      if [TOTAL_CPU_PCT] and [TOTAL_CPU_PCT] >= 80.0 {
        mutate { add_tag => ["cpu_spike"] }
      }
    }


    # Parse cFS Event messages (specifically useful for HK, HS and other apps)
    # Matcher typisk format: "HK_APP 1: HK Initialized. Version..." 
    # eller "HS_APP 10: Watchdog enabled..."
    if [sim_message] =~ /HK_APP/ or [sim_message] =~ /HS_APP/ {
      grok {
        match => { 
          "sim_message" => "%{WORD:cfs_app_name}\s+%{NUMBER:cfs_event_id}:\s+%{GREEDYDATA:cfs_event_text}" 
        }
        tag_on_failure => ["unparsed_cfs_event"]
      }
      
      # Konverter event ID til et rigtigt tal, så du kan sortere på det i Kibana
      if [cfs_event_id] {
        mutate {
          convert => { "cfs_event_id" => "integer" }
        }
      }
    }
  }
  # end system_log

}
# end filter


# =============================================================================
output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "nos3-telemetry-%{+YYYY.MM.dd}"
  }
  stdout { codec => rubydebug }
}
