# =============================================================================
# NOS3 Logstash Pipeline
#
# Three log sources feed Kibana:
#
#   LAYER 1 - software_bus   attack_logs/cfs_god_view.json
#             Every CCSDS message seen on the cFS Software Bus (SB).
#             Fields: msg_id (hex string), sequence (int), timestamp, length.
#             Enriched here with: msg_name, layer, subsystem, msg_direction.
#
#   LAYER 2 - system_log     omni_logs/*.log
#             One file per NOS3 simulator subsystem (EPS, GPS, RW, ADCS…)
#             plus cpu_monitor.log (Docker stats) and cfs_evs.log (EVS events).
#             Log format: TIMESTAMP [LEVEL] - Component::Method:  message text
#
# Attack layer taxonomy (stored in field "layer"):
#   FSW_CORE      - cFE OS services: ES, EVS, SB, TBL, TIME
#   FSW_HERITAGE  - standard cFS apps: TO, CI, DS, FM, CF, LC, SC, SCH
#   COMPONENT     - hardware component FSW apps: EPS, GPS, RW, Radio, ADCS…
#   RESEARCH      - custom research apps: BEACON_APP
#   UNKNOWN       - unrecognised MID
# =============================================================================

input {
  # ── LAYER 1: cFS Software Bus "God View" ──────────────────────────────────
  # One JSON object per line; populated by the COSMOS god-view script during runs.
  file {
    path             => "/attack_logs/cfs_god_view.json"
    start_position   => "beginning"
    sincedb_path     => "/dev/null"
    codec            => "json"
    type             => "software_bus"
  }

  # ── LAYER 2: NOS3 simulator + auxiliary logs ──────────────────────────────
  # `tlm_hk_decoded.log` is intentionally excluded here so it is parsed only
  # once, by the LAYER 3 input below. Without this exclusion the same file is
  # double-ingested as both `system_log` and `hk_decoded`.
  file {
    path             => "/omni_logs/*.log"
    # Exclude the decoded HK log (parsed by LAYER 3) and, defensively, any
    # binary pcap captured by the tcpdump sidecar (those live under
    # attack_logs/tcpdump/, not omni_logs/, but never let Logstash ingest one).
    exclude          => ["tlm_hk_decoded.log", "*.pcap"]
    start_position   => "beginning"
    sincedb_path     => "/dev/null"
    type             => "system_log"
  }

  # ── LAYER 3: Decoded HK payload telemetry ────────────────────────────────
  # One JSON object per line; written by god_view_capture.py for known MIDs.
  # Fields: type, app, subsystem, msg_id, timestamp, sequence, + decoded payload fields.
  file {
    path           => "/omni_logs/tlm_hk_decoded.log"
    start_position => "beginning"
    sincedb_path   => "/dev/null"
    codec          => "json"
    type           => "hk_decoded"
  }

  # ── LAYER 4: Ground-side uplink dispatch log ─────────────────────────────
  # One JSON object per line, written by gnss_gs_responder_task.rb on each
  # successful cmd() dispatch. Source-of-truth for "Uplinks" / "Uplink rate"
  # panels; absence of a matching gnss_gs_ping_roundtrip HK doc reveals a
  # broken GS->FSW chain. The TO_LAB downlink stream that feeds
  # cfs_god_view.json never carries CMDs, so this side-channel is necessary
  # to count uplinks honestly without aliasing them off HK.
  file {
    path           => "/omni_logs/gnss_uplinks.log"
    start_position => "beginning"
    sincedb_path   => "/dev/null"
    codec          => "json"
    type           => "gs_uplink"
  }
}

# =============================================================================
filter {

  # ── Universal: convert sim-emitted Unix epoch float "timestamp" to integer
  # milliseconds. Both cfs_god_view.json (software_bus) and tlm_hk_decoded.log
  # (hk_decoded) emit `timestamp` as a float like 1777207816.124. ES epoch_*
  # date parsers reject scientific notation (which Jackson emits for floats),
  # so coerce to an integer-millisecond long that the index-template
  # `epoch_millis` format accepts cleanly.
  if [timestamp] {
    ruby {
      code => 'ts = event.get("timestamp"); event.set("timestamp", (ts.to_f * 1000).to_i) if ts.is_a?(Numeric)'
    }
  }

  # -- Shared observation clock (`obs_time`): one date-typed field on BOTH the
  # bus side (here) and the sim-truth side (the system_log grok block below). It
  # is the wall-clock instant the value was OBSERVED at its source, NOT
  # @timestamp (Logstash ingest time). The truth path (sim stdout -> docker logs
  # -> omni_logs file -> file tail) ingests later and jitterier than the bus
  # path, so on an @timestamp axis truth lags and reads as "stopped" after a PoC
  # trigger. Bucketing the bus-vs-truth overlays on obs_time keeps the two
  # series aligned regardless of ingest latency.
  #
  # Bus source: prefer host_timestamp (passive_listener records, Unix epoch
  # seconds); fall back to `timestamp`, present on every json-codec bus doc -
  # god_view_capture.py sets it to host wall-clock at packet receive, and the
  # ruby above has already converted it to epoch-millis (hence UNIX_MS). Keying
  # obs_time on host_timestamp ALONE left hk_decoded bus docs (written by
  # god_view_capture.py, which emits no host_timestamp) with no obs_time, so the
  # bus series dropped out of the overlays and only the truth line rendered.
  # Purely additive: @timestamp and sc_timestamp are untouched.
  if [host_timestamp] {
    date {
      match  => ["host_timestamp", "UNIX"]
      target => "obs_time"
      tag_on_failure => ["_obs_time_parsefailure_bus"]
    }
  } else if [timestamp] {
    date {
      # The ruby above normalises a Numeric `timestamp` to integer epoch-ms, so
      # UNIX_MS is the normal path. List UNIX as a secondary so a `timestamp`
      # that slipped through as a seconds value (e.g. arrived as a STRING, which
      # the `ts.is_a?(Numeric)` guard skips) still parses to a sane ~now instant
      # instead of dropping the bus series with _obs_time_parsefailure_bus.
      match  => ["timestamp", "UNIX_MS", "UNIX"]
      target => "obs_time"
      tag_on_failure => ["_obs_time_parsefailure_bus"]
    }
  }

  # ── Spacecraft time: passive_listener.py decodes the cFE telemetry secondary
  # header into `sc_timestamp`, a Unix epoch float in seconds, on every TLM
  # record. The listener REBASES it so the first packet of a run anchors to
  # host wall-clock now (the raw header counts MET from J2000, which would
  # otherwise land in the year 2000); the stored value is therefore a true UTC
  # epoch starting at the current date/time. Parse it into a real date-typed
  # field so Kibana can use spacecraft time as an axis. We deliberately keep
  # @timestamp as Logstash ingest time (so replay-as-fresh-stream and existing
  # time-range panels keep working) and target sc_timestamp itself rather than
  # @timestamp. Danish local-time display is the Kibana dateFormat:tz setting
  # applied by elk/refresh_index_pattern_fields.py, not a shift baked in here.
  if [sc_timestamp] {
    date {
      match  => ["sc_timestamp", "UNIX"]
      target => "sc_timestamp"
      tag_on_failure => ["_sc_timestamp_parsefailure"]
    }
  }

  # ── Ground-side uplink tag: the gnss_gs_responder_task writes one JSON
  # line per dispatched ping to /omni_logs/gnss_uplinks.log. Every such
  # record is a real GS->FSW uplink attempt and must be counted as one.
  if [type] == "gs_uplink" {
    mutate { add_tag => ["gnss_ping_uplink"] }
  }

  # ===========================================================================
  # LAYER 1 - Software Bus god view
  # ===========================================================================
  if [type] == "software_bus" {

    # ── Full MID -> human name dictionary ────────────────────────────────────
    # Generated at `make config` time by scripts/mid/gen_mid_registry.py from
    # the FSW *_topicids.h / *_msgid_values.h headers. Single source of truth.
    # refresh_interval picks up a freshly re-run `make config` without a
    # Logstash restart.
    translate {
      field            => "msg_id"
      destination      => "msg_name"
      dictionary_path  => "/etc/logstash/mid/mid_to_name.yml"
      refresh_interval => 60
      fallback         => "UNKNOWN_MSG"
    }

    # ── Attack layer classification ──────────────────────────────────────────
    # Also generated from the FSW headers via scripts/mid/gen_mid_registry.py,
    # grouped by name prefix in scripts/mid/mid_groupings.yaml.
    translate {
      field            => "msg_id"
      destination      => "layer"
      dictionary_path  => "/etc/logstash/mid/mid_to_layer.yml"
      refresh_interval => 60
      fallback         => "UNKNOWN"
    }

    # ── Subsystem name ───────────────────────────────────────────────────────
    translate {
      field            => "msg_id"
      destination      => "subsystem"
      dictionary_path  => "/etc/logstash/mid/mid_to_subsystem.yml"
      refresh_interval => 60
      fallback         => "UNKNOWN"
    }

    # ── Command vs Telemetry direction ────────────────────────────────────────
    # CCSDS primary header: bit 12 set (0x1xxx) = command; clear (0x0xxx) = telemetry.
    ruby {
      code => '
        mid_str = event.get("msg_id") || ""
        begin
          mid = Integer(mid_str)
          event.set("msg_direction", mid >= 0x1800 ? "CMD" : "TLM")
          event.set("msg_id_int", mid)
        rescue ArgumentError
          event.set("msg_direction", "UNKNOWN")
        end
      '
    }

    # ── noisy_app attack: tag the 7 pipe-saturation target MIDs ─────────────
    # Used to plot the spam burst as a distinct series in Kibana.
    # Actual targets from noisy_app.c: ES=0x1806 EVS=0x1801 SB=0x1803 TIME=0x1805
    #   TBL=0x1804 CI_APP=0x1884 TO=0x1880   (note: 0x1884 is ci, NOT ci_lab 0x18E0)
    if [msg_id] in ["0x1806", "0x1801", "0x1803", "0x1805", "0x1804", "0x1884", "0x1880"] {
      mutate { add_tag => ["noisy_app_spam_target"] }
    }

    # ── Tag the noisy_app trigger candidates (BEACON PING) ───────────────────
    if [msg_id] == "0x18F0" {
      mutate { add_tag => ["beacon_cmd"] }
    }

    # ── GS-issued GENERIC_GNSS GS_PING_CC uplink ────────────────────────────
    # The COSMOS gnss_gs_responder sends a function-code-4 command on
    # GENERIC_GNSS_CMD_MID (0x1952) when the spacecraft is in SCIENCE mode.
    # cfs_god_view.json captures function_code for CMD packets (see
    # god_view_capture.py: parse_primary_header), so we tag only fc=4 to
    # avoid picking up routine NOOP / RESET / ENABLE / DISABLE traffic.
    if [msg_id] == "0x1952" and [function_code] == 4 {
      mutate { add_tag => ["gnss_ping_uplink"] }
    }

    # ── SB packet drop detector: tag gaps in per-MID sequence counter ────────
    # Ruby is the only scripting language available in Logstash filters.
    #
    # Saved-run replay tripwire: the cFE CCSDS sequence counter is 14 bits
    # (0x3FFF) and wraps. When Logstash starts ingesting a saved run, the
    # first few packets per MID can present an apparent backwards jump
    # because the producer was already mid-sequence. Treat backwards jumps
    # of more than half the wrap range (>= 8192) as wraps, not gaps.
    ruby {
      code => '
        mid = event.get("msg_id") || "unknown"
        seq = event.get("sequence")
        return unless seq
        @seq_map ||= {}
        prev = @seq_map[mid]
        if prev
          expected = (prev + 1) & 0x3FFF
          actual   = seq.to_i & 0x3FFF
          if actual != expected
            gap = (actual - expected) & 0x3FFF
            # Suppress wrap-arounds and replay-edge artefacts: a "gap" larger
            # than half the counter range is almost certainly a wrap or a
            # producer reset, not a dropped packet. Real publisher / pipe
            # overruns produce small forward gaps (1..few hundred).
            if gap >= 8192
              event.set("sb_seq_wrap", true)
            else
              event.tag("sb_sequence_gap")
              event.set("sb_gap_size", gap)
            end
          end
        end
        @seq_map[mid] = seq.to_i
      '
    }
  }


  # ===========================================================================
  # LAYER 2 - Simulator and auxiliary logs  (omni_logs/*.log)
  # ===========================================================================
  if [type] == "system_log" {

    # ── Extract subsystem name from filename ──────────────────────────────────
    grok {
      match => { "path" => ".*/%{GREEDYDATA:subsystem}\.log" }
    }
    mutate {
      gsub => [ "subsystem", "sc01_-_", "" ]
    }

    # Drop XML config dumps and pure blank lines
    if [message] =~ /^\s*</ or [message] =~ /^\s*$/ {
      drop {}
    }

    # ────────────────────────────────────────────────────────────────────────
    # cfs_evs - cFS Event Services events captured via cfs_evs_capture.sh
    #
    # docker logs --timestamps adds an ISO 8601 prefix:
    #   2024-01-15T10:30:45.123456789Z   <cFS EVS line>
    #
    # cFE EVS console format:
    #   YYYY-DDD-HH:MM:SS.sssss AppName EventID/EventType: Message text
    # ────────────────────────────────────────────────────────────────────────
    if [subsystem] == "cfs_evs" {
      # Strip optional docker timestamp prefix
      grok {
        match      => { "message" => "(?:%{TIMESTAMP_ISO8601:docker_ts}Z?\s+)?%{GREEDYDATA:evs_raw}" }
        tag_on_failure => []
      }

      # Parse cFE EVS line - two formats in the wild:
      #   (a) ".EVS Port1 YYYY-DDD-HH:MM:SS.ssss  PROC/SUBSYS/APPNAME EVENT_ID: text"
      #       This is the cFE Open-Source "Port1" console format. EVENT_TYPE is
      #       not printed in this format, only EVENT_ID. Seen in every current run.
      #   (b) "YYYY-DDD-HH:MM:SS  AppName EVENT_ID/EVENT_TYPE: text"
      #       Older format. Retained for backward compatibility.
      grok {
        # cFE prints a day-of-year (3 digits) not a month-day (2 digits). %{MONTHDAY}
        # only matches 1-2 digits so "1970-001-..." never parses. Use \d{3} for the
        # day-of-year field and keep the literal dot optional so lines without the
        # "\n." packet marker still match.
        match => { "evs_raw" => [
          "\.?EVS Port1\s+%{YEAR}-\d{3}-%{TIME}\s+\d+/\d+/%{DATA:evs_app_name}\s+%{NUMBER:evs_event_id}:\s+%{GREEDYDATA:evs_message}",
          "%{YEAR}-\d{3}-%{TIME}\s+%{DATA:evs_app_name}\s+%{NUMBER:evs_event_id}/%{NUMBER:evs_event_type_num}:\s+%{GREEDYDATA:evs_message}"
        ] }
        tag_on_failure => []
      }

      if [evs_event_id] {
        mutate { convert => { "evs_event_id" => "integer" } }
      }

      # Map numeric EVENT_TYPE to readable severity when we have it (format b)
      if [evs_event_type_num] {
        mutate { convert => { "evs_event_type_num" => "integer" } }
        if [evs_event_type_num] == 1 { mutate { add_field => { "evs_severity" => "DEBUG"       } } }
        if [evs_event_type_num] == 2 { mutate { add_field => { "evs_severity" => "INFORMATION" } } }
        if [evs_event_type_num] == 4 { mutate { add_field => { "evs_severity" => "ERROR"       } } }
        if [evs_event_type_num] == 8 { mutate { add_field => { "evs_severity" => "CRITICAL"    } } }
      }

      # Derive severity from message content for format (a) where EVENT_TYPE is absent.
      # Keyword heuristic matches what cFE apps conventionally print at each level.
      # The "Critical Data Store" phrase is a feature name (CDS), not a severity:
      # `LC use of Critical Data Store disabled` is INFORMATION, not CRITICAL.
      # Same for the LC `AP state change PASS to FAIL` text (a mission event).
      # Same for the LC `AP failed while passive` text: the cFS source emits this
      # at INFORMATION (LC_AP_PASSIVE_FAIL_INF_EID, lc_action.c:199) when an AP
      # whose per-AP state is PASSIVE crosses its fail threshold; LC suppresses
      # the RTS but logs the event. It is a periodic mission diagnostic, not a
      # fault. Mis-classification by the generic "FAIL" rule below was producing
      # ERROR-tagged docs in the index for AP3 (Denmark FOV entry, RTS 2) and
      # AP4 (Denmark FOV exit, RTS 1).
      if ![evs_severity] and [evs_app_name] {
        if [evs_message] =~ /(?i)Critical Data Store/ {
          mutate { add_field => { "evs_severity" => "INFORMATION" } }
        } else if [evs_message] =~ /(?i)AP state change/ {
          mutate { add_field => { "evs_severity" => "INFORMATION" } }
        } else if [evs_message] =~ /(?i)AP failed while passive/ {
          mutate { add_field => { "evs_severity" => "INFORMATION" } }
        } else if [evs_app_name] == "LC" and [evs_message] =~ /AP = [0-9]+, FailCount = [0-9]+, RTS = [0-9]+/ {
          # LC appends the LC_AP_EVENT_TAIL_STR " : AP = N, FailCount = M, RTS = R"
          # to every AP-fired event. Source severity is whatever the ADT entry
          # says (INFORMATION for AP3 SCIENCE_OVERFLY and AP4 SCIENCE_EXIT,
          # CRITICAL for AP0/1/2). The CRITICAL keyword in those messages is
          # already caught by the rule below; this branch handles the
          # INFORMATION-typed AP events whose trailer "FailCount=" was being
          # mis-classified as ERROR by the generic FAIL keyword rule.
          mutate { add_field => { "evs_severity" => "INFORMATION" } }
        } else if [evs_app_name] == "SC" and [evs_message] =~ /^Start RTS [0-9]+ Rejected: RTS Not Loaded or In Use/ {
          # Benign double-trigger: LC AP fires Start RTS while the same RTS is
          # already executing. The system state is unchanged (the running RTS
          # continues). Demote from ERROR to INFORMATION.
          mutate { add_field => { "evs_severity" => "INFORMATION" } }
        } else if [evs_app_name] == "SC" and [evs_message] =~ /^Start RTS 004 Rejected: RTS Disabled/ {
          # Boot-time race: LC AP5 (HS_RESET) evaluates WP10 before HS publishes
          # its first HK packet, fires once, and tries to start RTS 4 before
          # RTS 1 wakeup-3 has run its Enable RTS 4. RTS 4 is enabled
          # immediately after this; the rejection is one-shot. Demote.
          mutate { add_field => { "evs_severity" => "INFORMATION" } }
        } else if [evs_message] =~ /(?i)\b(CRITICAL|FATAL|PANIC)\b/ {
          mutate { add_field => { "evs_severity" => "CRITICAL" } }
        } else if [evs_message] =~ /(?i)\b(ERROR|ERR|FAIL(ED|URE)?|overflow|rejected|dropped|exception|anomal)/ {
          mutate { add_field => { "evs_severity" => "ERROR" } }
        } else if [evs_message] =~ /(?i)\b(WARN(ING)?|retry|retrying|timeout|skipped|missing)\b/ {
          mutate { add_field => { "evs_severity" => "WARNING" } }
        } else {
          mutate { add_field => { "evs_severity" => "INFORMATION" } }
        }
      }

      # Tag noisy_app attack lifecycle events
      if [evs_app_name] == "NOISY_APP" {
        mutate { add_field => { "attack_app" => "NOISY_APP" } }
        if [evs_message] =~ /THRESHOLD REACHED|MULTI-VECTOR ATTACK/ {
          mutate { add_tag => ["attack_armed"] }
        }
        if [evs_message] =~ /PING.*intercepted/ {
          mutate { add_tag => ["attack_trigger_ping"] }
        }
        if [evs_message] =~ /Active.*Listening/ {
          mutate { add_tag => ["attack_loaded"] }
        }
        # Supply-chain piggyback PoC signals (see poc/piggyback_noisy/).
        if [evs_message] =~ /piggyback opcode/ {
          mutate { add_tag => ["piggyback_opcode"] }
        }
        if [evs_message] =~ /EPS HK SPOOF|EPS override ENGAGED/ {
          mutate { add_tag => ["eps_spoof"] }
        }
        if [evs_message] =~ /SB POOL LOCK/ {
          mutate { add_tag => ["sb_pool_lock"] }
        }
      }

      # Tag BEACON_APP PONG responses (confirms link health pre/post attack)
      if [evs_app_name] == "BEACON_APP" and [evs_message] =~ /PONG|Ping.*acknowledged/ {
        mutate { add_tag => ["beacon_pong"] }
      }

      # Tag SB overflow / pipe full errors (key noisy_app side effect)
      if [evs_message] =~ /Pipe Overflow|MsgId.*dropped|ERR.*pipe/ {
        mutate { add_tag => ["sb_pipe_overflow"] }
      }

      # Drop ubiquitous cFE startup noise - always appears at boot, never actionable
      if [evs_raw] =~ /Startup Sync failed|cFE startup complete|attempting to start|Startup.*timeout/ {
        drop {}
      }

      # Drop SBN single-FSW peer-connect noise. Single-FSW build means no peer
      # exists; SBN repeatedly logs connect attempts and unable-to-connect.
      # Previously tag-stripped to INFORMATION; drop entirely now since it
      # carries no analytical value for single-FSW deployments.
      if [evs_app_name] == "SBN" and [evs_message] =~ /^(connecting to peer|unable to connect to peer|Processing all subscriptions|configuring peer)/ {
        drop {}
      }

      # Drop LC startup-transient "WP data value is a float NAN" events. All 17
      # NaN-producing watchpoints (3, 6-9, 30-33, 35-38, 40-43) read from
      # NOVATEL_OEM615_DEVICE_TLM_MSG (GPS lat/lon/alt) which the GPS sim
      # publishes as NaN until its first 42-frame parse succeeds. The events
      # cluster at boot and fire 38-40 times per launch; LC degrades to PASS
      # immediately once the GPS frame populates. Surface a real persistent
      # NaN by removing this filter and inspecting the GPS sim init path.
      if [evs_app_name] == "LC" and [evs_message] =~ /WP data value is a float NAN/ {
        drop {}
      }

      # Drop CFE_SB "No subscribers for MsgId" events. cFE startup publishes
      # a few status messages from CFE_ES that no app subscribes to; SB logs
      # the unsubscribed publish as informational. No actionable consumer in
      # this build, and the event is documented as benign in the cFE manual.
      if [evs_app_name] == "CFE_SB" and [evs_message] =~ /^No subscribers for MsgId/ {
        drop {}
      }

      # Drop OSAL symbol-table probe failures - OSAL scans every loaded .so for symbols at
      # boot; apps like LC and SC export globals from the static core image, not the .so,
      # so the probe always fails. The apps themselves load and run correctly.
      if [message] =~ /OS_GenericSymbolLookup_Impl.*undefined symbol/ {
        drop {}
      }

      # Drop MD (Memory Dwell) table-staging failures - MD expects /cf/md_dw*.tbl binary
      # files that are not deployed in this research config. Three log lines all trace
      # the same root cause: missing table artifact at startup.
      if [message] =~ /MD_APP.*Error.*0xC0000003.*loading tbl/ { drop {} }
      if [message] =~ /MD.*Application Init Failed/ { drop {} }
      if [evs_raw] =~ /MD.*Table entry.*0xC0000003/ { drop {} }

      # Drop MGR first-boot safe-mode entry - on a fresh container the MGR persistence
      # file does not exist; reading garbage bytes triggers the anomalous-reboot guard.
      # Harmless: MGR enters SAFE MODE, which is the correct default.
      if [message] =~ /MGR.*Restore Hk Packet error.*Anomalous reboot/ {
        drop {}
      }

      # ── MGR mode change events ────────────────────────────────────────────────
      # "MGR: Set mode command received [1]"  (1=SAFE, 3=SCIENCE)
      if [evs_app_name] == "MGR" {
        grok {
          match => { "evs_message" => "Set mode command received \[%{INT:mgr_mode_num}\]" }
          tag_on_failure => []
        }
        if [mgr_mode_num] {
          mutate { convert => { "mgr_mode_num" => "integer" } }
          if [mgr_mode_num] == 1 { mutate { add_field => { "mgr_mode" => "SAFE"    } } }
          if [mgr_mode_num] == 3 { mutate { add_field => { "mgr_mode" => "SCIENCE" } } }
        }
      }

      # ── LC actionpoint state transitions ─────────────────────────────────────
      # "AP state change from PASS to FAIL: AP = 0"
      if [evs_app_name] == "LC" {
        grok {
          match => { "evs_message" => "AP state change from %{WORD:lc_ap_from} to %{WORD:lc_ap_to}: AP = %{INT:lc_ap_num}" }
          tag_on_failure => []
        }
        if [lc_ap_num] { mutate { convert => { "lc_ap_num" => "integer" } } }
        if [lc_ap_to] == "FAIL" { mutate { add_tag => ["lc_actionpoint_fired"] } }

        # LC restored its Watchpoint/Actionpoint Results Tables from the Critical
        # Data Store on a warm (processor) reset. With LC_SAVE_TO_CDS enabled,
        # this is the persistence tell: any AP latched PASSIVE before the reset
        # comes back PASSIVE, so an operator reboot does NOT clear an attacker's
        # spoof-driven SAFE latch. See docs/security/cds-persistence.md.
        if [evs_message] =~ /restored from Critical Data Store/ {
          mutate { add_tag => ["lc_cds_restored"] }
        }
      }

      # ── LC AP3 science overfly ─────────────────────────────────────────────────
      if [evs_app_name] == "LC" and [evs_message] =~ /Science overfly/ {
        mutate { add_tag => ["science_overfly"] }
        mutate { add_field => { "mission_event" => "SCIENCE_OVERFLY" } }
      }

      # ── HS app monitor failures ────────────────────────────────────────────────
      # "App Monitor Failure: APP:(GENERIC_EPS): Action: Event Only"
      if [evs_app_name] == "HS" and [evs_message] =~ /App Monitor Failure/ {
        grok {
          match => { "evs_message" => "App Monitor Failure: APP:\(%{DATA:hs_failed_app}\)" }
          tag_on_failure => []
        }
        mutate { add_tag => ["hs_app_failure"] }
      }


      # ── Tag and Parse our custom HS System Monitor CPU logs ─────────────────
      # CFE_ES_WriteToSysLog lines are NOT EVS events - they appear in evs_raw
      # without the "AppName EventID/type:" prefix, so evs_message is never set.
      # Match against evs_raw instead.
      if [evs_raw] =~ /HS_SYSMON cpu_pct=/ {
        grok {
          match => { "evs_raw" => "HS_SYSMON cpu_pct=%{NUMBER:hs_cpu_pct} util_scaled=%{NUMBER:hs_cpu_util_scaled} util_peak=%{NUMBER:hs_cpu_util_peak}" }
          tag_on_failure => ["hs_parse_failure"]
        }
        mutate {
          convert => {
            "hs_cpu_pct"        => "float"
            "hs_cpu_util_scaled" => "integer"
            "hs_cpu_util_peak"   => "integer"
          }
        }
        if [hs_cpu_pct] and [hs_cpu_pct] >= 75.0 {
          mutate { add_tag => ["hs_cpu_hogging"] }
        }
      }


      # ── CS (Checksum) app events ──────────────────────────────────────────────
      # CS is the integrity monitor: checksum failures and disable commands are
      # direct evidence of memory-tampering attacks or attempts to hide them.
      if [evs_app_name] == "CS" {
        mutate { add_field => { "attack_app" => "CS" } }

        # Checksumming deliberately disabled - may precede or follow memory attack
        if [evs_message] =~ /Background Checksumming Disabled/ {
          mutate { add_tag => ["cs_disabled"] }
        }

        if [evs_message] =~ /Background Checksumming Enabled/ {
          mutate { add_tag => ["cs_enabled"] }
        }

        # Any checksum mismatch → memory or code integrity violation detected.
        # CS emits one event per miscompare cycle: region name + expected/computed values.
        if [evs_message] =~ /Checksum Failure/ {
          mutate { add_tag => ["cs_checksum_failure"] }

          # Generic: "Checksum Failure: <region>, Expected: 0x…, Calculated: 0x…"
          grok {
            match => { "evs_message" => "Checksum Failure: %{DATA:cs_failure_region}, Expected: 0x%{DATA:cs_expected_checksum}, Calculated: 0x%{DATA:cs_computed_checksum}" }
            tag_on_failure => []
          }
          # EEPROM/Memory variants include the address:
          # "Checksum Failure: Address 0x<addr> in EEPROM Table, Expected: …"
          grok {
            match => { "evs_message" => "Checksum Failure: Address 0x%{DATA:cs_failure_addr} in %{DATA:cs_failure_table}, Expected: 0x%{DATA:cs_expected_checksum}, Calculated: 0x%{DATA:cs_computed_checksum}" }
            tag_on_failure => []
          }
        }
      }


      # ── MM (Memory Manager) app events ───────────────────────────────────────
      # MM allows direct memory read/write by ground command.
      # Poke, Fill, and Load are the three write primitives used in memory attacks.
      if [evs_app_name] == "MM" {
        mutate { add_field => { "attack_app" => "MM" } }

        # Memory poke - single-address write (8/16/32-bit).
        # "Poke Command: Addr = 0x…, Size = N bits, Data = 0x…"
        # This is the primary ground-command memory-write primitive.
        if [evs_message] =~ /Poke Command/ {
          mutate { add_tag => ["mm_memory_poke"] }
          grok {
            match => { "evs_message" => "Poke Command: Addr = %{NOTSPACE:mm_poke_addr}, Size = %{NUMBER:mm_poke_bits} bits, Data = 0x%{DATA:mm_poke_data}" }
            tag_on_failure => []
          }
          mutate { convert => { "mm_poke_bits" => "integer" } }
        }

        # Memory fill - bulk write of a repeating pattern to a range.
        # "Fill Memory Command: Filled N bytes at address: 0x… with pattern: 0x…"
        if [evs_message] =~ /Fill Memory Command/ {
          mutate { add_tag => ["mm_memory_fill"] }
          grok {
            match => { "evs_message" => "Fill Memory Command: Filled %{NUMBER:mm_fill_bytes} bytes at address: %{NOTSPACE:mm_fill_addr} with pattern: 0x%{DATA:mm_fill_pattern}" }
            tag_on_failure => []
          }
          mutate { convert => { "mm_fill_bytes" => "integer" } }
        }

        # Load with interrupts disabled - inject a binary blob atomically.
        # "Load Memory WID Command: Wrote N bytes to address: 0x…"
        if [evs_message] =~ /Load Memory WID Command/ {
          mutate { add_tag => ["mm_memory_load_wid"] }
          grok {
            match => { "evs_message" => "Load Memory WID Command: Wrote %{NUMBER:mm_load_bytes} bytes to address: %{NOTSPACE:mm_load_addr}" }
            tag_on_failure => []
          }
          mutate { convert => { "mm_load_bytes" => "integer" } }
        }

        # EEPROM write-enable - unlocks non-volatile storage bank for modification.
        # "EEPROM bank N write enabled, cFE_Status= 0x…"
        if [evs_message] =~ /EEPROM bank .* write enabled/ {
          mutate { add_tag => ["mm_eeprom_write_enable"] }
          grok {
            match => { "evs_message" => "EEPROM bank %{NUMBER:mm_eeprom_bank} write enabled" }
            tag_on_failure => []
          }
          mutate { convert => { "mm_eeprom_bank" => "integer" } }
        }

        # EEPROM write-disable - re-locks the bank (may follow a write attack).
        if [evs_message] =~ /EEPROM bank .* write disabled/ {
          mutate { add_tag => ["mm_eeprom_write_disable"] }
          grok {
            match => { "evs_message" => "EEPROM bank %{NUMBER:mm_eeprom_bank} write disabled" }
            tag_on_failure => []
          }
          mutate { convert => { "mm_eeprom_bank" => "integer" } }
        }
      }


      # ── MD (Memory Dwell) app events ─────────────────────────────────────────
      # MD samples memory at configurable addresses and rates.
      # Dwell start/stop and jam commands change which memory is being monitored,
      # which is relevant both for attack execution and for detecting surveillance.
      if [evs_app_name] == "MD" {
        mutate { add_field => { "attack_app" => "MD" } }

        # Dwell start - begin sampling a set of memory addresses.
        # "Start Dwell Table command processed successfully for table mask 0x…"
        if [evs_message] =~ /Start Dwell Table command processed successfully/ {
          mutate { add_tag => ["md_dwell_start"] }
          grok {
            match => { "evs_message" => "Start Dwell Table command processed successfully for table mask 0x%{DATA:md_dwell_mask}" }
            tag_on_failure => []
          }
        }

        # Dwell stop - halt memory sampling (suppresses monitoring, covers tracks).
        # "Stop Dwell Table command processed successfully for table mask 0x…"
        if [evs_message] =~ /Stop Dwell Table command processed successfully/ {
          mutate { add_tag => ["md_dwell_stop"] }
          grok {
            match => { "evs_message" => "Stop Dwell Table command processed successfully for table mask 0x%{DATA:md_dwell_mask}" }
            tag_on_failure => []
          }
        }

        # Jam - overwrite a single dwell table entry (redirects sampling to a new address).
        # "Successful Jam to Dwell Tbl#N Entry #N"
        if [evs_message] =~ /Successful Jam to Dwell/ {
          mutate { add_tag => ["md_jam_dwell"] }
          grok {
            match => { "evs_message" => "Successful Jam to Dwell Tbl#%{NUMBER:md_jam_table} Entry #%{NUMBER:md_jam_entry}" }
            tag_on_failure => []
          }
          mutate { convert => { "md_jam_table" => "integer" "md_jam_entry" => "integer" } }
        }
      }


      # ── Cross-app attack compound detection ──────────────────────────────────
      # If the same EVS stream contains both a CS disable AND a MM write,
      # tag the sequence as a combined integrity-bypass + memory-write attack.
      # (Each tag is set independently above; this just adds a composite label.)
      if "cs_disabled" in [tags] and ("mm_memory_poke" in [tags] or "mm_memory_fill" in [tags] or "mm_memory_load_wid" in [tags]) {
        mutate { add_tag => ["cs_mm_combined_attack"] }
      }

    }


    # ────────────────────────────────────────────────────────────────────────
    # Common NOS3 simulator log format
    # 2026-03-22 23:39:52.058348 [ INFO  ] - Component::Method:  message text
    # ────────────────────────────────────────────────────────────────────────
    if [subsystem] != "cfs_evs" and [subsystem] !~ /cpu_monitor/ {
      grok {
        match      => { "message" => "%{TIMESTAMP_ISO8601:sim_timestamp} \[%{DATA:log_level}\] - %{DATA:sim_component}:\s+%{GREEDYDATA:sim_message}" }
        tag_on_failure => []
      }
      if [log_level] {
        mutate { strip => ["log_level"] }
      }

      # Sim-truth side of the shared observation clock (see the obs_time block
      # near the top of filter{}). sim_timestamp is the sim log line's own emit
      # time "yyyy-MM-dd HH:mm:ss.ffffff" (UTC: the sim containers inherit the
      # host UTC clock). Drop the fractional seconds into a scratch field and
      # parse to second resolution - plenty for the bucketed bus-vs-truth
      # overlays, and it sidesteps Joda misreading a 6-digit fraction as
      # milliseconds. Now truth docs share the same wall-clock axis as the bus
      # hk_decoded docs, so the overlay panels stay aligned regardless of the
      # truth path's slower file-tail ingest.
      if [sim_timestamp] {
        mutate { add_field => { "[@metadata][obs_src]" => "%{sim_timestamp}" } }
        mutate { gsub => ["[@metadata][obs_src]", "\.\d+$", ""] }
        date {
          match    => ["[@metadata][obs_src]",
                       "yyyy-MM-dd HH:mm:ss",
                       "yyyy-MM-dd'T'HH:mm:ss",
                       "ISO8601"]
          target   => "obs_time"
          timezone => "UTC"
          tag_on_failure => ["_obs_time_parsefailure_truth"]
        }
      }
    }


    # Drop radio simulator cryptolib failures - the cryptolib TC/TM encryption service is
    # not deployed in this research/dev config; the radio sim retries indefinitely but
    # operates normally over the unencrypted path.
    if [subsystem] =~ /nos3-radio/ and [sim_message] =~ /Failed to resolve IP for cryptolib|cryptolib/ {
      drop {}
    }

    # Drop the 42-dynamics startup race: component sims (GPS, star tracker,
    # blackboard) retry the TCP connect to the 42 engine during parallel container
    # startup. The retry loop always eventually succeeds; post-startup 42 outages
    # are already visible via loss of fresh GPS / ST telemetry on the mission
    # dashboard, so keeping the warning adds noise without adding signal.
    if [sim_message] =~ /failed to connect host fortytwo/ {
      drop {}
    }

    # Same race, second message variant: "Continuing, but could not connect socket
    # for host fortytwo, port ...: Connection refused". Emitted once per retry by
    # SimData42SocketProvider before the connect loop succeeds, and persistently
    # by the star-tracker sim because 42 does not serve port 4282 in this build.
    # Both cases are visible from the dashboard via empty st_q0 / no fresh ST HK,
    # so the warning adds noise without adding signal.
    if [sim_message] =~ /could not connect socket for host fortytwo/ {
      drop {}
    }

    # Final retry-loop terminus messages: when SimData42SocketProvider gives up
    # and emits "Maximum number of connection attempts reached" / "Unable to
    # connect TELEMETRY host fortytwo, port N to 42, no thread will be started
    # to listen". The thruster sim hits these because port 4242 (thruster->42
    # socket) is not opened by 42 in this profile (entry 8 of Inp_IPC.txt is
    # OFF). Same root cause as the connect-refused drops above. Identical to
    # those lines in being expected-by-design under the current static config.
    if [sim_message] =~ /Maximum number of connection attempts reached.*Host fortytwo/ {
      drop {}
    }
    if [sim_message] =~ /Unable to connect TELEMETRY host fortytwo/ {
      drop {}
    }
    # Same root cause class for the COMMAND-port variant: the thruster sim
    # requests a 42 COMMAND socket on port 4280 (Inp_IPC.txt "Thruster IPC"),
    # but 42 does not serve that port in this profile. Same expected-by-design
    # state as the TELEMETRY connect drop above; thruster keeps no other ERROR
    # message after this is dropped.
    if [sim_message] =~ /Unable to connect COMMAND host fortytwo/ {
      drop {}
    }

    # ── RW data-point parsing race during 42 handshake ─────────────────────
    # Each generic-reactionwheel-sim instance constructs its first
    # GenericRWDataPoint from whatever 42-frame is available the moment the
    # 42 socket connects. If the frame has not yet been populated the value
    # for SC[0].Whl[N].H is empty, and std::stod throws "stod" with no
    # numeric content. Within ~1s the next 42 frame arrives and parsing
    # succeeds; rw_momentum then populates correctly. The 25-burst per RW
    # is purely a startup-race log and adds no diagnostic value because
    # downstream `rw_momentum` populates regardless. Drop it so the dashboard
    # ERROR count is not dominated by this transient.
    if [subsystem] =~ /^nos3-rw[0-9]+$/ and [sim_message] == "Parsing exception stod" {
      drop {}
    }

    # ── CSS data-point parsing race during 42 handshake ────────────────────
    # Identical class to the RW stod race above. Generic_cssDataPoint::do_parsing
    # (generic_css_data_point.cpp:96-106) reads SC[0].CSS[N].Illum / Valid keys
    # from the first 42 frame; on the very first parse the keys are empty and
    # std::stof throws "stof". The catch-handler in do_parsing zeros the data
    # vector and the next 42 frame parses normally. One-shot at startup;
    # downstream `css_*` fields populate within ~1 sim second.
    if [subsystem] == "nos3-css" and [sim_message] == "Parsing exception stof" {
      drop {}
    }

    # ── DEBUG-level "no command port requested" narrative line ─────────────
    # SimData42SocketProvider prints this for every sim that operates with no
    # 42 command path (CSS, EPS, GPS, IMU, MAG, Truth42). It is a confirmation
    # that the configuration was honoured, not an error. Goes through Logstash
    # as DEBUG-level, but the words "none connected" hit the broad ops-grep
    # pattern set, so drop to keep the dashboard error counters clean.
    if [sim_message] =~ /No COMMAND port \([0-9]+\) to (42|N) requested, none connected/ {
      drop {}
    }

    # ── HS_SysMonInit: Linux PSP has no /proc-CPU monitor in this build ────
    # Single boot-time syslog write from hs_sysmon.c:53. The message is
    # informational-by-design under the NOS3 Linux PSP (per project journal
    # 2026-04-25 19:05 entry, item 3); container-level CPU comes from the
    # cpu_monitor sidecar instead. Tag-strip rather than drop, so the line
    # remains forensically queryable but does not fan out to ERROR sweeps.
    if [evs_raw] =~ /HS_SysMonInit\(\): No system monitor device available/ {
      mutate {
        add_tag => ["noise_filtered"]
        replace => { "evs_severity" => "INFORMATION" }
      }
    }

    # ── CS "No valid entries in the table" (events 107 / 108 / 109) ────────
    # cs_table_processing.c emits these once per CS default table at boot
    # whenever every slot is in CS_ChecksumState_EMPTY (the upstream NOS3
    # default). The proper FSW-side fix is to populate at least one slot
    # with State=DISABLED, but the nos-linux PSP rejects addr=0 in
    # CFE_PSP_MemValidateRange (PSP shared/coveragetest-cfe-psp-memrange.c
    # line 51-52 confirms this returns INVALID_MEM_ADDR), so we cannot
    # supply a safe placeholder without picking a real EEPROM/RAM range.
    # Match the existing noise-filter pattern instead: tag rather than drop
    # so the events remain forensically queryable but stop showing up as
    # uncategorised dashboard hits.
    if [evs_app_name] == "CS" and [evs_message] =~ /No valid entries in the table/ {
      mutate {
        add_tag => ["noise_filtered"]
        replace => { "evs_severity" => "INFORMATION" }
      }
    }

    # ── CFE_SB 14 "No subscribers for MsgId 0x808" boot race ───────────────
    # 0x0808 = CFE_EVS_LONG_EVENT_MSG_MID. TO_LAB subscribes it (see
    # cfg/nos3_defs/tables/to_lab_sub.c:102) but CFE_ES emits its first
    # EVS LONG events before TO_LAB completes CFE_SB_Subscribe. A bounded
    # handful of events publish with no subscriber and CFE_SB logs SB14
    # once per orphan packet. Stops as soon as TO_LAB initialises.
    if [evs_app_name] == "CFE_SB" and [evs_event_id] == 14 and [evs_message] =~ /MsgId 0x808\b/ {
      mutate {
        add_tag => ["noise_filtered"]
        replace => { "evs_severity" => "INFORMATION" }
      }
    }

    # ── LC 60 "AP failed while passive" recurring evaluation noise ─────────
    # Fired by lc_action.c (LC_AP_PASSIVE_FAIL_INF_EID) every time an AP
    # currently in LC_APSTATE_PASSIVE state evaluates to FAIL. AP3
    # (SCIENCE_OVERFLY) and AP4 (SCIENCE_EXIT) are inverses of each other
    # over the Denmark FOV box, so once their RTSes have fired and the APs
    # are passivated, every subsequent LC eval produces one of these per
    # AP. Operationally meaningful AP-state transitions are still visible
    # via LC55 (state change) and LC56 (RTS request); LC60 is the recurring
    # diagnostic, not the alert.
    if [evs_app_name] == "LC" and [evs_event_id] == 60 {
      mutate {
        add_tag => ["noise_filtered"]
        replace => { "evs_severity" => "INFORMATION" }
      }
    }

    # ── SBN peer-connect race during cold-start ────────────────────────────
    # SBN (Software Bus Network) tries to connect to peer FSWs that may not
    # yet exist on the network. cFE prints these as INFORMATION events but
    # the message contains "unable" so a generic keyword sweep flags them.
    # No mission impact: SBN is a multi-FSW feature and this fork runs
    # single-FSW.
    if [evs_app_name] == "SBN" and [evs_message] =~ /unable to connect to peer/ {
      mutate {
        add_tag => ["noise_filtered"]
        replace => { "evs_severity" => "INFORMATION" }
      }
    }

    # ── Generic component "already enabled" startup events ─────────────────
    # The component cFS apps (GENERIC_CSS / FSS / IMU / MAG / SAMPLE) emit an
    # ERROR-severity EVS event on cold-start when the boot SC table issues an
    # Enable command for a device that the sim already brings up enabled.
    # One event per component per boot, never repeated. Classify as
    # known-noise so the dashboard ERROR sweep stays clean.
    if [evs_message] =~ /Device enable failed, already enabled/ {
      mutate {
        add_tag => ["noise_filtered"]
        replace => { "evs_severity" => "INFORMATION" }
      }
    }

    # Sim containers launch every component from a single image and each reads
    # nos3-simulator.xml to find its own <active> flag. Components marked
    # <active>false</active> (camsim, generic-thruster-sim in this research
    # profile) log a WARNING at startup and then exit cleanly. The warning is
    # expected-by-design configuration output, not a fault, so drop it to keep
    # the dashboard's WARNING count clean.
    if [sim_message] =~ /Simulator ".+" is not active in "nos3-simulator.xml"/ {
      drop {}
    }

    # Tag any ERROR-level line from a simulator subsystem with a generic sim_error tag,
    # and apply a per-subsystem tag for drill-down (e.g. blackboard_error).
    if [log_level] == "ERROR" and [subsystem] =~ /^nos3-/ {
      mutate { add_tag => ["sim_error"] }
    }
    if [log_level] == "ERROR" and [subsystem] == "nos3-blackboard" {
      mutate { add_tag => ["blackboard_error"] }
    }
    if [log_level] == "ERROR" and [subsystem] =~ /^nos3-rw/ {
      mutate { add_tag => ["rw_error"] }
    }
    if [log_level] == "ERROR" and [subsystem] == "nos3-startrk" {
      mutate { add_tag => ["startrk_error"] }
    }

    # ────────────────────────────────────────────────────────────────────────
    # EPS simulator - power and battery numeric fields
    # Log source: omni_logs/nos3-eps.log (captured from sc01-eps-sim container)
    # ────────────────────────────────────────────────────────────────────────
    if [subsystem] =~ /nos3-eps/ or [subsystem] == "EPS_Sim" {
      # The sim emits one composite tick-summary line per tick that contains
      # every EPS metric, plus per-metric human-readable lines. Match the
      # composite line first so joint aggregations work; the per-metric
      # lines provide single-field rows for time-series panels.
      # See debug/EPS_DESIGN.md and debug/EPS_VALIDATION.md.
      grok {
        match => { "message" =>
          "EPS_TLM solar=%{NUMBER:eps_solar_power_w} used=%{NUMBER:eps_power_used_w} balance=%{NUMBER:eps_power_balance_w} wh=%{NUMBER:eps_battery_wh} mv=%{NUMBER:eps_battery_mv} soc=%{NUMBER:eps_battery_soc_pct} sun=%{NUMBER:eps_solar_array_enabled}"
        }
        tag_on_failure => []
      }
      grok { match => { "message" => "Power from the solar panels is %{NUMBER:eps_solar_power_w}"   } tag_on_failure => [] }
      grok { match => { "message" => "Total power used is %{NUMBER:eps_power_used_w}"               } tag_on_failure => [] }
      grok { match => { "message" => "Battery Watt Hours are now %{NUMBER:eps_battery_wh}"          } tag_on_failure => [] }
      grok { match => { "message" => "Battery Voltage is now %{NUMBER:eps_battery_mv}"              } tag_on_failure => [] }
      grok { match => { "message" => "Battery SOC pct is %{NUMBER:eps_battery_soc_pct}"             } tag_on_failure => [] }
      grok { match => { "message" => "Power balance is %{NUMBER:eps_power_balance_w}"               } tag_on_failure => [] }
      grok { match => { "message" => "Solar Array Connected\? %{NUMBER:eps_solar_array_enabled}"    } tag_on_failure => [] }
      mutate {
        convert => {
          "eps_solar_power_w"       => "float"
          "eps_power_used_w"        => "float"
          "eps_battery_wh"          => "float"
          "eps_battery_mv"          => "integer"
          "eps_battery_soc_pct"     => "float"
          "eps_power_balance_w"     => "float"
          "eps_solar_array_enabled" => "boolean"
        }
      }
    }


    # ────────────────────────────────────────────────────────────────────────
    # Reaction Wheel simulator - angular momentum
    # ────────────────────────────────────────────────────────────────────────
    if [sim_message] =~ /REPLY\s+CURRENT_MOMENTUM=/ {
      grok {
        match      => { "sim_message" => "REPLY\s+CURRENT_MOMENTUM=%{NUMBER:rw_momentum}" }
        tag_on_failure => []
      }
      mutate { convert => { "rw_momentum" => "float" } }
    }


    # ────────────────────────────────────────────────────────────────────────
    # GPS simulator - position and time
    # ────────────────────────────────────────────────────────────────────────
    if [message] =~ /^GPS Data Point:/ {
      grok {
        match => { "message" => "GPS Data Point:\s+AbsTime:\s+%{NUMBER:gps_abs_time}\s+Leap Seconds:\s+%{NUMBER:gps_leap_seconds}.*ECEF:\s+%{NUMBER:gps_ecef_x},%{NUMBER:gps_ecef_y},%{NUMBER:gps_ecef_z}.*Geodetic Lat/Lng/Alt\(m above WGS-84\):\s+%{NUMBER:gps_lat},%{NUMBER:gps_lon},%{NUMBER:gps_alt}" }
        tag_on_failure => []
      }
      mutate {
        convert => {
          "gps_abs_time"   => "float"
          "gps_ecef_x"     => "float"
          "gps_ecef_y"     => "float"
          "gps_ecef_z"     => "float"
          "gps_lat"        => "float"
          "gps_lon"        => "float"
          "gps_alt"        => "float"
        }
      }
      if [gps_ecef_x] and [gps_ecef_x] == 0.0 and [gps_ecef_y] and [gps_ecef_y] == 0.0 {
        mutate { add_field => { "gps_valid" => false } }
      } else {
        mutate { add_field => { "gps_valid" => true } }
      }
      # The sim emits Geodetic Lat/Lon in radians (42 native units). Convert to
      # decimal degrees so the Denmark dashboard KQL (gps_lat >= 55 etc.) works
      # directly without end users having to think in radians.
      if [gps_lat] {
        ruby {
          code => "event.set('gps_lat', event.get('gps_lat') * 180.0 / Math::PI)"
        }
      }
      if [gps_lon] {
        ruby {
          code => "event.set('gps_lon', event.get('gps_lon') * 180.0 / Math::PI)"
        }
      }
      # Compose a geo_point so Maps / region-map panels can render the orbit
      # track. Mapped as geo_point in the index template.
      if [gps_lat] and [gps_lon] {
        mutate {
          add_field => {
            "[gps_location][lat]" => "%{gps_lat}"
            "[gps_location][lon]" => "%{gps_lon}"
          }
        }
      }
      # GPGGA-derived fixes from the NovAtel sim are NMEA GPS-only.
      mutate { add_field => { "nav_protocol" => "GPS" "nav_msg_type" => "BESTXYZA" } }
    }


    # ────────────────────────────────────────────────────────────────────────
    # TT&C simulator - link-budget telemetry tagged at the source.
    # Emitted by the new generic_tt_c sim (or by generic_radio with link
    # geometry enabled) as a single line per HK tick:
    #   [TTC] ground_station=Svalbard link_state=ACQUIRED elevation_deg=12.5
    #         slant_range_km=1543.2 doppler_hz=4521.0 pass_number=3
    #         pass_count=3 packets_downlinked=128 bytes_downlinked=16384
    #         packets_dropped=0
    # The leading [TTC] tag identifies the source app so no Logstash
    # heuristic is needed to differentiate this from other simulator output.
    # ────────────────────────────────────────────────────────────────────────
    if [message] =~ /\[TTC\]/ {
      grok {
        match => { "message" => "\[TTC\]\s+ground_station=%{DATA:ground_station}\s+link_state=%{WORD:link_state}\s+elevation_deg=%{NUMBER:elevation_deg}\s+slant_range_km=%{NUMBER:slant_range_km}\s+doppler_hz=%{NUMBER:doppler_hz}\s+pass_number=%{NUMBER:pass_number}\s+pass_count=%{NUMBER:pass_count}\s+packets_downlinked=%{NUMBER:packets_downlinked}\s+bytes_downlinked=%{NUMBER:bytes_downlinked}\s+packets_dropped=%{NUMBER:packets_dropped}" }
        tag_on_failure => ["_grokparsefailure_ttc"]
      }
      mutate {
        convert => {
          "elevation_deg"      => "float"
          "slant_range_km"     => "float"
          "doppler_hz"         => "float"
          "pass_number"        => "integer"
          "pass_count"         => "integer"
          "packets_downlinked" => "integer"
          "bytes_downlinked"   => "integer"
          "packets_dropped"    => "integer"
        }
        add_field => { "subsystem" => "TTC" }
      }
      translate {
        source => "link_state"
        target => "link_state_code"
        dictionary => {
          "IDLE"      => "0"
          "OFFLINE"   => "0"
          "ACQUIRING" => "1"
          "ACQUIRED"  => "2"
          "IN_PASS"   => "2"
          "LOSING"    => "3"
        }
        fallback => "-1"
      }
      mutate { convert => { "link_state_code" => "integer" } }
    }


    # ────────────────────────────────────────────────────────────────────────
    # GNSS simulator - multi-constellation navigation telemetry tagged at
    # the source. Emitted by the new generic_gnss sim as a single line:
    #   [GNSS] solution_type=FIX_3D num_sats_total=12 num_sats_gps=8
    #          num_sats_glonass=4 num_sats_galileo=0 num_sats_beidou=0
    #          pdop=2.1 hdop=1.4 vdop=1.6
    # Distinct from the GPS app (NMEA / position-fix-only) so users can
    # filter `subsystem:GNSS` vs `subsystem:GPS` in Kibana.
    # ────────────────────────────────────────────────────────────────────────
    if [message] =~ /\[GNSS\]/ {
      grok {
        match => { "message" => "\[GNSS\]\s+solution_type=%{WORD:gnss_solution_type}\s+num_sats_total=%{NUMBER:gnss_num_sats_total}\s+num_sats_gps=%{NUMBER:gnss_num_sats_gps}\s+num_sats_glonass=%{NUMBER:gnss_num_sats_glonass}\s+num_sats_galileo=%{NUMBER:gnss_num_sats_galileo}\s+num_sats_beidou=%{NUMBER:gnss_num_sats_beidou}\s+pdop=%{NUMBER:gnss_pdop}\s+hdop=%{NUMBER:gnss_hdop}\s+vdop=%{NUMBER:gnss_vdop}" }
        tag_on_failure => ["_grokparsefailure_gnss"]
      }
      mutate {
        convert => {
          "gnss_num_sats_total"   => "integer"
          "gnss_num_sats_gps"     => "integer"
          "gnss_num_sats_glonass" => "integer"
          "gnss_num_sats_galileo" => "integer"
          "gnss_num_sats_beidou"  => "integer"
          "gnss_pdop"             => "float"
          "gnss_hdop"             => "float"
          "gnss_vdop"             => "float"
        }
        add_field => {
          "subsystem"    => "GNSS"
          "nav_protocol" => "GNSS"
          "nav_msg_type" => "RANGECMPA"
        }
      }
      translate {
        source => "gnss_solution_type"
        target => "gnss_solution_type_code"
        dictionary => {
          "NONE"   => "0"
          "FLOAT"  => "1"
          "FIX_3D" => "2"
        }
        fallback => "-1"
      }
      mutate { convert => { "gnss_solution_type_code" => "integer" } }
    }

    # ────────────────────────────────────────────────────────────────────────
    # GNSS truth log - lat/lon/alt the simulator computed BEFORE the bus
    # emission. The FSW reads the same numbers off the UART and republishes
    # them in HK; the GNSS-to-GS Validation dashboard joins truth vs HK and
    # alerts on divergence (the spoof signal).
    #   [GNSS_TRUTH] lat=56.123456 lon=12.345678 alt_m=412.50
    # ────────────────────────────────────────────────────────────────────────
    if [message] =~ /\[GNSS_TRUTH\]/ {
      grok {
        match => { "message" => "\[GNSS_TRUTH\]\s+lat=%{NUMBER:gnss_truth_lat}\s+lon=%{NUMBER:gnss_truth_lon}\s+alt_m=%{NUMBER:gnss_truth_alt_m}" }
        tag_on_failure => ["_grokparsefailure_gnss_truth"]
      }
      mutate {
        convert => {
          "gnss_truth_lat"   => "float"
          "gnss_truth_lon"   => "float"
          "gnss_truth_alt_m" => "float"
        }
        add_field => { "subsystem" => "GNSS_TRUTH" }
      }
      if [gnss_truth_lat] and [gnss_truth_lon] {
        if [gnss_truth_lat] >= 55 and [gnss_truth_lat] <= 58 and
           [gnss_truth_lon] >= 8  and [gnss_truth_lon] <= 16 {
          mutate { add_field => { "in_denmark_box_truth" => 1 } }
        } else {
          mutate { add_field => { "in_denmark_box_truth" => 0 } }
        }
        mutate { convert => { "in_denmark_box_truth" => "integer" } }
      }
    }


    # ────────────────────────────────────────────────────────────────────────
    # IMU simulator - linear acceleration and angular rotation rates
    # Log source: omni_logs/nos3-imu.log
    # Each axis value is its own log event (separate docker log line).
    # Format: "X linear acceleration: -9.80665, converted to 999999"
    # NOTE: match against [message] not [sim_message] - the common NOS3 grok
    # parses "X linear acceleration" as sim_component, leaving only the bare
    # number in sim_message.  Matching the full raw line avoids this split.
    # ────────────────────────────────────────────────────────────────────────
    if [subsystem] =~ /nos3-imu/ {
      grok { match => { "message" => "X linear acceleration:\s*%{NUMBER:imu_acc_x}" }  tag_on_failure => [] }
      grok { match => { "message" => "Y linear acceleration:\s*%{NUMBER:imu_acc_y}" }  tag_on_failure => [] }
      grok { match => { "message" => "Z linear acceleration:\s*%{NUMBER:imu_acc_z}" }  tag_on_failure => [] }
      grok { match => { "message" => "X rotational rate:\s*%{NUMBER:imu_gyro_x}" }     tag_on_failure => [] }
      grok { match => { "message" => "Y rotational rate:\s*%{NUMBER:imu_gyro_y}" }     tag_on_failure => [] }
      grok { match => { "message" => "Z rotational rate:\s*%{NUMBER:imu_gyro_z}" }     tag_on_failure => [] }
      mutate {
        convert => {
          "imu_acc_x"  => "float"
          "imu_acc_y"  => "float"
          "imu_acc_z"  => "float"
          "imu_gyro_x" => "float"
          "imu_gyro_y" => "float"
          "imu_gyro_z" => "float"
        }
      }
    }


    # ────────────────────────────────────────────────────────────────────────
    # IMU truth log - angular rates + linear accels the simulator produced
    # BEFORE the bus emission. The FSW reads these off the device; the IMU
    # covert-channel PoC adds a gyro bias inside the FSW only, so the bus value
    # (imu_gyro_* / imu_acc_*, decoded from GENERIC_IMU_DEVICE_TLM into the
    # hk_decoded layer) diverges from this sim-side truth (imu_truth_gyro_* /
    # imu_truth_acc_*). Truth and bus must stay on DISTINCT field names so the
    # poc-imu comparison is possible (do NOT route the sim DEBUG "rotational
    # rate" lines into imu_gyro_* - those stay on subsystem nos3-imu for the
    # covert-imu / sensor-ground-truth boards). The IMU sim emits this line from
    # generic_imu_hardware_model.cpp:
    #   [IMU_TRUTH] gyro_x=-400.000000 gyro_y=... acc_x=-10.000000 ...
    # ────────────────────────────────────────────────────────────────────────
    if [message] =~ /\[IMU_TRUTH\]/ {
      grok {
        match => { "message" => "\[IMU_TRUTH\]\s+gyro_x=%{NUMBER:imu_truth_gyro_x}\s+gyro_y=%{NUMBER:imu_truth_gyro_y}\s+gyro_z=%{NUMBER:imu_truth_gyro_z}\s+acc_x=%{NUMBER:imu_truth_acc_x}\s+acc_y=%{NUMBER:imu_truth_acc_y}\s+acc_z=%{NUMBER:imu_truth_acc_z}" }
        tag_on_failure => ["_grokparsefailure_imu_truth"]
      }
      mutate {
        convert => {
          "imu_truth_gyro_x" => "float"
          "imu_truth_gyro_y" => "float"
          "imu_truth_gyro_z" => "float"
          "imu_truth_acc_x"  => "float"
          "imu_truth_acc_y"  => "float"
          "imu_truth_acc_z"  => "float"
        }
        add_field => { "subsystem" => "IMU_TRUTH" }
      }
    }


    # ────────────────────────────────────────────────────────────────────────
    # Magnetometer simulator - field vector
    # Log source: omni_logs/nos3-mag.log
    # sim_message contains: "Data point=Magnetometer values: x, y, z"
    # NOTE: MAG values use scientific notation (e.g. 8.44e-07) which the
    # built-in %{NUMBER} grok pattern does not support.  A custom SCINUM
    # pattern is defined inline to handle the exponent part.
    # ────────────────────────────────────────────────────────────────────────
    if [subsystem] =~ /nos3-mag/ {
      grok {
        pattern_definitions => { "SCINUM" => "[-+]?(?:[0-9]+\.?[0-9]*|\.[0-9]+)(?:[Ee][+-]?[0-9]+)?" }
        match => { "sim_message" => "Magnetometer values:\s*%{SCINUM:mag_x},\s*%{SCINUM:mag_y},\s*%{SCINUM:mag_z}" }
        tag_on_failure => []
      }
      mutate {
        convert => {
          "mag_x" => "float"
          "mag_y" => "float"
          "mag_z" => "float"
        }
      }
    }


    # ────────────────────────────────────────────────────────────────────────
    # Fine Sun Sensor (FSS) simulator - alpha/beta sun angles
    # Log source: omni_logs/nos3-fss.log
    # sim_message: "data_point data:  valid=TRUE , alpha=12.345, beta=-23.456"
    # NOTE: valid=TRUE has trailing space before comma ("TRUE , alpha=");
    #       valid=FALSE does not ("FALSE, alpha="). Use \s* before the comma.
    # ────────────────────────────────────────────────────────────────────────
    if [subsystem] =~ /nos3-fss/ {
      grok {
        match => { "sim_message" => "valid=%{WORD:fss_valid}\s*,\s*alpha=%{NUMBER:fss_alpha},\s*beta=%{NUMBER:fss_beta}" }
        tag_on_failure => []
      }
      mutate {
        convert => {
          "fss_alpha" => "float"
          "fss_beta"  => "float"
        }
      }
    }


    # ────────────────────────────────────────────────────────────────────────
    # Star Tracker simulator - attitude quaternion
    # Log source: omni_logs/nos3-startrk.log
    # sim_message: "is_valid=1, data_point=q0, q1, q2, q3, converted values=..."
    # ────────────────────────────────────────────────────────────────────────
    if [subsystem] =~ /nos3-startrk/ {
      grok {
        match => { "sim_message" => "is_valid=%{NUMBER:st_valid},\s*data_point=%{NUMBER:st_q0},\s*%{NUMBER:st_q1},\s*%{NUMBER:st_q2},\s*%{NUMBER:st_q3}" }
        tag_on_failure => []
      }
      mutate {
        convert => {
          "st_valid" => "integer"
          "st_q0"    => "float"
          "st_q1"    => "float"
          "st_q2"    => "float"
          "st_q3"    => "float"
        }
      }
    }


    # ────────────────────────────────────────────────────────────────────────
    # Truth42 Dynamics simulator - position, velocity, attitude
    # Log source: omni_logs/nos3-truth42.log
    #
    # The current truth42sim emits one combined data point per cadence:
    #   "Truth 42 Data Point: ... Pos: x, y, z Vel: vx, vy, vz svb: ...
    #    bvb: ... Hvb: ... wn: wx, wy, wz qn: q0, q1, q2, q3 PosW: ...
    #    VelW: ... LinAccB: ax, ay, az GyroB: gx, gy, gz rwH: h0, h1, h2"
    # Earlier upstream NOS3 builds used PosN / VelN / qbn keys. Both formats
    # are supported below by trying each independently.
    # ────────────────────────────────────────────────────────────────────────
    if [subsystem] =~ /nos3-truth42/ {
      grok {
        pattern_definitions => { "SCINUM" => "[-+]?(?:[0-9]+\.?[0-9]*|\.[0-9]+)(?:[Ee][+-]?[0-9]+)?" }
        match => { "sim_message" => [
          "(?:SC\[0\]\s+)?Pos(?:N)?:\s*%{SCINUM:t42_pos_x},\s*%{SCINUM:t42_pos_y},\s*%{SCINUM:t42_pos_z}",
          "Pos:\s*%{SCINUM:t42_pos_x},\s*%{SCINUM:t42_pos_y},\s*%{SCINUM:t42_pos_z}"
        ] }
        tag_on_failure => []
      }
      grok {
        pattern_definitions => { "SCINUM" => "[-+]?(?:[0-9]+\.?[0-9]*|\.[0-9]+)(?:[Ee][+-]?[0-9]+)?" }
        match => { "sim_message" => [
          "Vel(?:N)?:\s*%{SCINUM:t42_vel_x},\s*%{SCINUM:t42_vel_y},\s*%{SCINUM:t42_vel_z}",
          "Vel:\s*%{SCINUM:t42_vel_x},\s*%{SCINUM:t42_vel_y},\s*%{SCINUM:t42_vel_z}"
        ] }
        tag_on_failure => []
      }
      grok {
        pattern_definitions => { "SCINUM" => "[-+]?(?:[0-9]+\.?[0-9]*|\.[0-9]+)(?:[Ee][+-]?[0-9]+)?" }
        match => { "sim_message" => [
          "qbn:\s*%{SCINUM:t42_q0},\s*%{SCINUM:t42_q1},\s*%{SCINUM:t42_q2},\s*%{SCINUM:t42_q3}",
          "qn\s*:\s*%{SCINUM:t42_q0},\s*%{SCINUM:t42_q1},\s*%{SCINUM:t42_q2},\s*%{SCINUM:t42_q3}"
        ] }
        tag_on_failure => []
      }
      grok {
        pattern_definitions => { "SCINUM" => "[-+]?(?:[0-9]+\.?[0-9]*|\.[0-9]+)(?:[Ee][+-]?[0-9]+)?" }
        match => { "sim_message" => "svb:\s*%{SCINUM:t42_svb_x},\s*%{SCINUM:t42_svb_y},\s*%{SCINUM:t42_svb_z}" }
        tag_on_failure => []
      }
      grok {
        pattern_definitions => { "SCINUM" => "[-+]?(?:[0-9]+\.?[0-9]*|\.[0-9]+)(?:[Ee][+-]?[0-9]+)?" }
        match => { "sim_message" => "GyroB:\s*%{SCINUM:t42_gyro_x},\s*%{SCINUM:t42_gyro_y},\s*%{SCINUM:t42_gyro_z}" }
        tag_on_failure => []
      }
      grok {
        pattern_definitions => { "SCINUM" => "[-+]?(?:[0-9]+\.?[0-9]*|\.[0-9]+)(?:[Ee][+-]?[0-9]+)?" }
        match => { "sim_message" => "LinAccB:\s*%{SCINUM:t42_linacc_x},\s*%{SCINUM:t42_linacc_y},\s*%{SCINUM:t42_linacc_z}" }
        tag_on_failure => []
      }
      grok {
        pattern_definitions => { "SCINUM" => "[-+]?(?:[0-9]+\.?[0-9]*|\.[0-9]+)(?:[Ee][+-]?[0-9]+)?" }
        match => { "sim_message" => "wn\s*:\s*%{SCINUM:t42_wn_x},\s*%{SCINUM:t42_wn_y},\s*%{SCINUM:t42_wn_z}" }
        tag_on_failure => []
      }
      mutate {
        convert => {
          "t42_pos_x" => "float"  "t42_pos_y" => "float"  "t42_pos_z" => "float"
          "t42_vel_x" => "float"  "t42_vel_y" => "float"  "t42_vel_z" => "float"
          "t42_q0"    => "float"  "t42_q1"    => "float"
          "t42_q2"    => "float"  "t42_q3"    => "float"
          "t42_svb_x" => "float"  "t42_svb_y" => "float"  "t42_svb_z" => "float"
          "t42_gyro_x"   => "float" "t42_gyro_y"   => "float" "t42_gyro_z"   => "float"
          "t42_linacc_x" => "float" "t42_linacc_y" => "float" "t42_linacc_z" => "float"
          "t42_wn_x"     => "float" "t42_wn_y"     => "float" "t42_wn_z"     => "float"
        }
      }
    }


    # ────────────────────────────────────────────────────────────────────────
    # Torquer simulator - magnetic dipole command
    # Log source: omni_logs/nos3-torquer.log
    # sim_message: "Dipole: x=..., y=..., z=..."
    # ────────────────────────────────────────────────────────────────────────
    if [subsystem] =~ /nos3-torquer/ {
      grok {
        pattern_definitions => { "SCINUM" => "[-+]?(?:[0-9]+\.?[0-9]*|\.[0-9]+)(?:[Ee][+-]?[0-9]+)?" }
        match => { "sim_message" => "Dipole:\s*x=%{SCINUM:torquer_dipole_x},\s*y=%{SCINUM:torquer_dipole_y},\s*z=%{SCINUM:torquer_dipole_z}" }
        tag_on_failure => []
      }
      mutate {
        convert => {
          "torquer_dipole_x" => "float"
          "torquer_dipole_y" => "float"
          "torquer_dipole_z" => "float"
        }
      }
    }


    # ────────────────────────────────────────────────────────────────────────
    # Sample component simulator - sun body vector
    # Log source: omni_logs/nos3-sample.log
    # sim_message: "sun body vector: x=..., y=..., z=..."
    # ────────────────────────────────────────────────────────────────────────
    if [subsystem] =~ /nos3-sample/ {
      grok {
        pattern_definitions => { "SCINUM" => "[-+]?(?:[0-9]+\.?[0-9]*|\.[0-9]+)(?:[Ee][+-]?[0-9]+)?" }
        match => { "sim_message" => "sun body vector:\s*x=%{SCINUM:sample_sun_body_x},\s*y=%{SCINUM:sample_sun_body_y},\s*z=%{SCINUM:sample_sun_body_z}" }
        tag_on_failure => []
      }
      mutate {
        convert => {
          "sample_sun_body_x" => "float"
          "sample_sun_body_y" => "float"
          "sample_sun_body_z" => "float"
        }
      }
    }


    # ────────────────────────────────────────────────────────────────────────
    # cpu_monitor - container-level CPU and per-thread breakdown
    #
    # Two line formats written by scripts/cpu_monitor.sh:
    #   CPU_MONITOR TOTAL_CPU_PCT=12.5 MEM_USED=45.2MiB MEM_LIMIT=... NUM_PIDS=42
    #   CPU_THREAD  THREAD_NAME=BEACON_APP CPU_PCT=1.2
    # ────────────────────────────────────────────────────────────────────────
    if [subsystem] in ["cpu_monitor", "CPU_Monitor"] {
      kv {
        source      => "message"
        value_split => "=:"
        field_split => " ,"
        trim_key    => "() \t"
        trim_value  => "() \t"
      }
      mutate {
        convert => {
          "TOTAL_CPU_PCT" => "float"
          "CPU_PCT"       => "float"
          "NUM_PIDS"      => "integer"
          "CMDCOUNTER"    => "integer"
          "ERRCOUNTER"    => "integer"
          "PINGCOUNTER"   => "integer"
        }
      }
      # Tag lines that indicate a CPU spike (attack onset signal)
      if [TOTAL_CPU_PCT] and [TOTAL_CPU_PCT] >= 80.0 {
        mutate { add_tag => ["cpu_spike"] }
      }
    }

    
    


  }
  # end system_log

  # ===========================================================================
  # LAYER 3 - Decoded HK payload telemetry
  # ===========================================================================
  if [type] == "hk_decoded" {
    # Rename HS-specific decoded fields to their dashboard-facing names so
    # panels do not need to know the raw struct field name.
    if [app] == "HS" and [resets_performed] {
      mutate { rename => { "resets_performed" => "hs_resets_performed" } }
    }
    mutate {
      convert => {
        "cpu_avg_pct"         => "float"
        "cpu_peak_pct"        => "float"
        "battery_mv"          => "integer"
        "solar_array_mv"      => "integer"
        "spacecraft_mode"     => "integer"
        "sci_pass_count"      => "integer"
        "num_rts_active"      => "integer"
        "rts_active_ctr"      => "integer"
        "cmd_count"           => "integer"
        "cmd_err_count"       => "integer"
        "lc_state"            => "integer"
        "curr_ats_id"         => "integer"
        "hs_resets_performed" => "integer"
        "gnss_lat"            => "float"
        "gnss_lon"            => "float"
        "in_denmark_box"      => "integer"
        "in_science_mode"     => "integer"
        "last_ping_seq"       => "integer"
        "last_ping_time"      => "integer"
        "ping_count"          => "integer"
      }
    }

    # ── Decoded EVS long-event telemetry (msg_id 0x0808) ──────────────────────
    # passive_listener decodes CFE_EVS_LongEventTlm into evs_app_name /
    # evs_event_id / evs_event_type / evs_message. Unlike the Port-1 console
    # scrape (subsystem "cfs_evs"), EventType here is the authoritative numeric
    # severity carried in the packet, so it is mapped directly with no keyword
    # inference. These docs carry app="EVS" / subsystem="EVS" and the
    # `evs_decoded` tag so dashboards can isolate them from the console stream,
    # which represents the same logical events and would otherwise double-count.
    if [app] == "EVS" {
      mutate {
        convert  => {
          "evs_event_id"   => "integer"
          "evs_event_type" => "integer"
        }
        add_tag  => ["evs_decoded"]
      }
      if [evs_event_type] == 1 { mutate { add_field => { "evs_severity" => "DEBUG"       } } }
      if [evs_event_type] == 2 { mutate { add_field => { "evs_severity" => "INFORMATION" } } }
      if [evs_event_type] == 4 { mutate { add_field => { "evs_severity" => "ERROR"       } } }
      if [evs_event_type] == 8 { mutate { add_field => { "evs_severity" => "CRITICAL"    } } }
    }

    # GENERIC_GNSS round-trip tag: an HK doc whose last_ping_seq is non-zero
    # is proof that at least one GS_PING_CC made it from the responder, into
    # the FSW, and was echoed back via HK telemetry. The dashboard's
    # "Closed round-trips" and "Round-trip log" panels both query this tag.
    if [app] == "GENERIC_GNSS" and [last_ping_seq] and [last_ping_seq] > 0 {
      mutate { add_tag => ["gnss_gs_ping_roundtrip"] }
    }

    # Preserve the producer-supplied UNIX timestamp as a queryable field.
    # Do NOT override @timestamp here: when Logstash replays a saved-run file
    # we want @timestamp = ingest time so dashboards on "last N minutes"
    # render the replay as a fresh stream. The original sim epoch is retained
    # in `sim_timestamp_unix` for any panel that needs absolute sim time.
    if [timestamp] {
      mutate {
        rename => { "timestamp" => "sim_timestamp_unix" }
        convert => { "sim_timestamp_unix" => "float" }
      }
    }

    # ── Spacecraft mode-change tagger ────────────────────────────────────────
    # MGR HK packets carry `spacecraft_mode` once per HK cycle. Compare the
    # current value against the last seen for the same subsystem and emit a
    # `spacecraft_mode_change` tag plus prev/new fields the moment the value
    # transitions. The state map is per-Logstash-process, which is fine for a
    # single-pipeline single-instance deployment.
    if [subsystem] == "MGR" and [spacecraft_mode] {
      ruby {
        code => '
          @prev_mode_map ||= {}
          sub = event.get("subsystem") || "MGR"
          new_mode = event.get("spacecraft_mode")
          prev = @prev_mode_map[sub]
          if prev && prev != new_mode
            event.tag("spacecraft_mode_change")
            event.set("spacecraft_mode_prev", prev)
            event.set("spacecraft_mode_new",  new_mode)
            event.set("mode_change_label",
                      "#{prev} -> #{new_mode}")
          end
          @prev_mode_map[sub] = new_mode
        '
      }
      # Human-readable enum aliases per components/mgr/fsw/cfs/src/mgr_app.h:
      #   1=MGR_SAFE_MODE, 2=MGR_SAFE_REBOOT_MODE, 3=MGR_SCIENCE_MODE, 4=MGR_SCIENCE_REBOOT_MODE.
      # Keep numeric `spacecraft_mode` for math; `spacecraft_mode_name` for charts.
      if [spacecraft_mode] == 1 { mutate { add_field => { "spacecraft_mode_name" => "SAFE"        } } }
      if [spacecraft_mode] == 2 { mutate { add_field => { "spacecraft_mode_name" => "SAFE_REBOOT"     } } }
      if [spacecraft_mode] == 3 { mutate { add_field => { "spacecraft_mode_name" => "SCIENCE"     } } }
      if [spacecraft_mode] == 4 { mutate { add_field => { "spacecraft_mode_name" => "SCIENCE_REBOOT"  } } }
      if ![spacecraft_mode_name] {
        mutate { add_field => { "spacecraft_mode_name" => "OTHER" } }
      }
    }

    # Mirror spacecraft_mode_name onto GENERIC_GNSS HK docs so panels that
    # correlate ping round-trips by mode (dashboard nos3-eo1-gnss-gs-validation,
    # panel "Round-trip log") get a non-null Mode column. GENERIC_GNSS HK only
    # carries the binary in_science_mode flag, so we project to two values.
    # Different msg_id from MGR HK, so no field stomping.
    if [subsystem] == "GENERIC_GNSS" and [type] == "hk_decoded" {
      if [in_science_mode] == 1 {
        mutate { add_field => { "spacecraft_mode_name" => "SCIENCE" } }
      } else if [in_science_mode] == 0 {
        mutate { add_field => { "spacecraft_mode_name" => "NOT_SCIENCE" } }
      }
    }
  }

  # -- obs_time fallback (parity with draco-rtems 49ceb73f): guarantee EVERY
  # doc carries the shared observation clock so a bus-vs-truth overlay never
  # silently drops a series. Primary obs_time is set near the top of filter{}
  # (bus: host_timestamp/timestamp; truth: the sim log line time). If neither
  # produced one - a renamed/missing source field or a parse miss - fall back
  # to @timestamp. Bus (hk_decoded) ingest lag is near-zero, so @timestamp is
  # a close stand-in and keeps the series visible. NOTE: this fork ALSO derives
  # bus obs_time from the packet `timestamp` field above, which (unlike this
  # @timestamp fallback) stays correct on `make load-run` replay; the fallback
  # only bites a genuine parse miss.
  if ![obs_time] {
    mutate { copy => { "@timestamp" => "obs_time" } }
  }
}
# end filter


# =============================================================================
output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "nos3-telemetry-%{+YYYY.MM.dd}"
  }
  stdout { codec => rubydebug }
}
